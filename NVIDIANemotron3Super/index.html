<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVIDIA Nemotron 3 Super</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
  <!-- Added marked.js for proper markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Replaced Inter with Space Grotesk and Outfit fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#05070d;
      --bg2:#080d16;
      --panel:rgba(12,18,31,.78);
      --panel2:rgba(17,25,42,.86);
      --glass:rgba(255,255,255,.055);
      --hover:rgba(255,255,255,.09);
      --text:#f5f8ff;
      --muted:#96a3b8;
      --soft:#c7d3e8;
      --line:rgba(167,192,255,.16);
      --cyan:#42e8ff;
      --green:#76ff7a;
      --pink:#ff5bd7;
      --yellow:#ffd166;
      --danger:#ff4d6d;
      --radius:8px;
      --shadow:0 24px 80px rgba(0,0,0,.55);
    }

    html,body{height:100%}
    body{
      overflow:hidden;
      color:var(--text);
      font-family: 'Outfit', 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif;
      /* Sleek dark radial fallback gradient (bg.json updates this if loaded successfully) */
      background: radial-gradient(circle at 50% 50%, #0a1128 0%, #05070d 100%);
      background-attachment: fixed;
    }

    button,input,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}
    svg{width:19px;height:19px;flex:0 0 auto}

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:310px minmax(0,1fr);
      position:relative;
      z-index:1;
    }

    .sidebar{
      height:100vh;
      min-width:0;
      display:flex;
      flex-direction:column;
      border-right:1px solid var(--line);
      background:rgba(3, 5, 9, 0.76);
      backdrop-filter:blur(24px);
    }

    .side-head,.top{
      height:76px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--line);
    }

    .side-head{padding:0 16px}
    .top{
      padding:0 22px;
      background:rgba(5,8,14,.52);
      backdrop-filter:blur(22px);
      position: relative;
    }

    .brand,.model-title,.status-pill{display:flex;align-items:center}
    .brand{gap:12px;min-width:0}
    .model-title{gap:13px;min-width:0;flex-wrap:wrap}
    .brand span,.model-title h1{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand span{font-size:22px;font-weight:900}
    .model-title h1{font-size:21px;font-weight:900}

    .logo,.hero-logo,.avatar{
      object-fit:contain;
    }
    .logo,.hero-logo{
      width:42px;
      height:42px;
      border-radius:8px;
      padding:5px;
      background: transparent !important;
    }
    .avatar{width:34px;height:34px;border-radius:50%;padding:4px}

    /* RESTORED STRUCTURAL BORDERS - Removed sidebar, top, side-head from this list */
    .icon-btn,.send,.new-chat,.chip,.google-btn,.user-btn,
    .chat-item,.quick,.bubble,.composer-wrap,.side-title,.account,
    .status-pill,.lock,textarea{
      border: none !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }

    .icon-btn,.send,.new-chat,.google-btn,.user-btn{
      border-radius: 100px !important; /* capsule shape */
      transition:transform .18s ease,background .18s ease;
    }

    .icon-btn{
      background: #181818;
      color: var(--text);
      display:grid;
      place-items:center;
      width:40px;
      height:40px;
    }
    .icon-btn:hover{
      transform:translateY(-1px);
      background: #303030;
      color: var(--text);
    }

    /* Actions styling for .mini buttons */
    .mini {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--soft);
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .mini:hover {
      background: var(--cyan);
      color: #000;
      border-color: var(--cyan);
      transform: translateY(-2px);
    }

    .new-chat{
      height:48px;
      margin:14px;
      background: #181818;
      color:var(--text);
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      border-radius: 100px !important;
    }
    .new-chat:hover{
      transform:translateY(-1px);
      background: #303030;
    }

    .side-title{
      padding:13px 16px 9px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0;
      background: transparent;
    }

    .chat-list{flex:1;overflow:auto;padding:0 10px 12px}
    .chat-item{
      width:100%;
      min-height:44px;
      border-radius: 100px !important;
      background: #181818;
      color:var(--soft);
      padding:10px 16px;
      text-align:left;
      display:flex;
      align-items:center;
      gap:9px;
      margin-bottom:4px;
    }
    .chat-item:hover{
      background: #303030;
      color:var(--text);
    }
    .chat-item.active{
      background: #494949;
      color:var(--text);
    }
    .chat-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}

    .account{padding:13px 14px 16px}
    .google-btn,.user-btn{
      width:100%;
      min-height:47px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 16px;
      border-radius: 100px !important;
    }
    .google-btn{
      background: #181818;
      color:var(--text);
      font-weight:800;
      justify-content:center;
    }
    .google-btn:hover{
      background: #303030;
    }
    .user-btn{
      background: #181818;
      color:var(--text);
      text-align:left;
    }
    .user-btn:hover{
      background: #303030;
    }
    .user-btn img{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#dbeafe}
    .user-name,.user-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-name{font-weight:800;font-size:14px}
    .user-email{font-size:12px;color:var(--muted)}

    .main{height:100vh;display:flex;flex-direction:column;min-width:0;position:relative}
    .menu-btn{display:none}

    /* Fixed styling for status-pill link */
    .status-pill{
      gap:8px;
      height:30px;
      padding:0 12px;
      border-radius: 100px !important;
      color:#d9ffe2;
      background: rgba(118, 255, 122, 0.1);
      border: 1px solid rgba(118, 255, 122, 0.2) !important;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
      display: inline-flex;
      align-items: center;
      transition: all 0.2s ease;
    }
    .status-pill:hover{
      background: rgba(118, 255, 122, 0.2);
      transform: translateY(-1px);
    }
    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .messages{
      flex:1;
      overflow:auto;
      padding:32px 22px 24px;
      scroll-behavior:smooth;
    }

    .welcome{
      max-width:900px;
      margin:0 auto 26px;
      text-align:center;
      padding-top:34px;
    }
    .welcome-row{display:flex;justify-content:center;align-items:center;margin-bottom:20px}
    .welcome h2{
      font-size:clamp(34px,5vw,64px);
      line-height:1.02;
      font-weight:900;
      background:white;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .welcome p{
      max-width:620px;
      margin:14px auto 0;
      color:var(--muted);
      font-size:17px;
      line-height:1.6;
    }

    .quick-grid{
      max-width:900px;
      margin:28px auto 0;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .quick{
      min-height:76px;
      border-radius: 20px !important;
      background: #181818;
      color:var(--text);
      padding:15px 20px;
      text-align:left;
      display:flex;
      gap:12px;
      align-items:center;
    }
    .quick:hover{
      background: #303030;
      transform:translateY(-1px);
    }
    .quick strong{display:block;font-size:14px;margin-bottom:4px}
    .quick span{display:block;font-size:13px;color:var(--muted);line-height:1.35}

    .thread{
      max-width:900px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .msg{display:flex;gap:12px;align-items:flex-start}
    .msg.user{justify-content:flex-end}

    .bubble{
      max-width:min(720px,88%);
      border-radius: 24px !important;
      padding:14px 18px;
      line-height:1.65;
      font-size:15px;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
      background: #181818;
      color: var(--text);
    }
    .user .bubble{
      background: #494949;
    }
    .assistant .bubble{
      background: #181818;
    }
    
    .actions{
      display:flex;
      gap:8px;
      margin-top:12px;
      align-items:center;
      flex-wrap:wrap;
    }
    .actions.justify-end {
      justify-content: flex-end;
    }

    /* CSS Styling for .version-nav and its buttons */
    .version-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--soft);
    }
    .version-nav button {
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      padding: 0;
      transition: all 0.2s ease;
    }
    .version-nav button:hover:not(:disabled) {
      background: var(--cyan);
      color: #000;
    }
    .version-nav button:disabled {
      color: var(--muted);
      opacity: 0.3;
      cursor: not-allowed;
    }
    .version-nav span {
      min-width: 30px;
      text-align: center;
      user-select: none;
      font-variant-numeric: tabular-nums;
    }

    .composer-wrap{
      padding:14px 22px 22px;
      background:rgba(5,8,14,.68);
      backdrop-filter:blur(22px);
    }
    .lock{
      max-width:900px;
      margin:0 auto 12px;
      background:rgba(255, 77, 109, 0.15);
      color:var(--danger);
      border: 1px solid rgba(255, 77, 109, 0.3) !important;
      padding:11px 13px;
      border-radius: 12px !important;
      font-size:14px;
      text-align:center;
    }
    .composer{
      max-width:900px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 54px;
      gap:10px;
      align-items:end;
    }
    textarea{
      height:56px;
      max-height:190px;
      resize:none;
      border-radius: 20px !important; /* Changed from 100px to avoid multi-line text clipping */
      background: #181818;
      color:var(--text);
      padding:17px 20px;
      outline:none;
      font-size:15px;
      line-height:1.45;
    }
    textarea:focus{
      background: #303030;
    }
    textarea:disabled{opacity:.6}
    .send{
      height:56px;
      background: #181818;
      color:#ffffff;
      font-weight:900;
      display:grid;
      place-items:center;
      border-radius: 100px !important;
    }
    .send:hover{
      transform:translateY(-1px);
      background: #303030;
    }
    .send.stop{
      background: #494949;
      color:#fff;
    }

    .hidden{display:none!important}

    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:fixed;
        inset:0 auto 0 0;
        width:min(314px,86vw);
        z-index:20;
        transform:translateX(-105%);
        transition:transform .22s ease;
      }
      .sidebar.open{transform:translateX(0)}
      .menu-btn{display:grid}
      .top{padding:0 14px}
      .model-title h1{font-size:17px}
      .status-pill{display:none}
      .messages{padding:22px 12px}
      .composer-wrap{padding:12px}
      .bubble{max-width:92%}
      .quick-grid{grid-template-columns:1fr}
    }

    .typing-indicator {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 12px 18px;
      background: #181818;
      border-radius: 100px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    /* CSS Loading progress indicator bar */
    .loading-bar {
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      position: absolute;
      bottom: 0;
      left: 0;
      z-index: 10;
      transition: width 0.4s ease;
    }
    .loading-bar.active {
      width: 100%;
      animation: loadingPulse 2s infinite ease-in-out;
    }
    @keyframes loadingPulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* Markdown Styles */
    .bubble p {
      margin-bottom: 12px;
    }
    .bubble p:last-child {
      margin-bottom: 0;
    }
    .bubble code {
      font-family: 'Space Grotesk', monospace;
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--cyan);
    }
    .bubble pre {
      background: #0f1422;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      overflow-x: auto;
      margin: 14px 0;
    }
    .bubble pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-size: 0.88em;
    }
    .bubble ul, .bubble ol {
      margin-left: 24px;
      margin-bottom: 12px;
    }
    .bubble li {
      margin-bottom: 4px;
    }
    .bubble strong {
      color: var(--cyan);
      font-weight: 700;
    }
    .bubble h1, .bubble h2, .bubble h3 {
      color: var(--text);
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: 800;
    }
    .bubble h1 { font-size: 1.4em; }
    .bubble h2 { font-size: 1.25em; }
    .bubble h3 { font-size: 1.1em; }
</style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <div class="brand">
          <img class="logo" src="../assets/logo.png" alt="Atlas logo" onerror="this.src='https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256'">
          <span>Atlas</span>
        </div>
        <button class="icon-btn" id="closeSide" title="Close sidebar" type="button">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <button class="new-chat" id="newChat" type="button">
        <i class="fas fa-plus"></i>
        New Chat
      </button>

      <div class="side-title">Previous Chats</div>
      <div class="chat-list" id="chatList"></div>

      <div class="account">
        <button class="google-btn" id="googleLogin" type="button">
          <i class="fab fa-google" style="font-size: 19px; margin-right: 8px;"></i>
          Continue with Google
        </button>

        <button class="user-btn hidden" id="userBox" title="Click to sign out" type="button">
          <img id="userPic" alt="User profile">
          <div style="min-width:0">
            <div class="user-name" id="fullName"></div>
            <div class="user-email" id="userEmail"></div>
          </div>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="top">
        <button class="icon-btn menu-btn" id="openSide" title="Open sidebar" type="button">
          <i class="fas fa-bars"></i>
        </button>

        <div class="model-title">
          <img class="hero-logo" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA logo">
          <h1>NVIDIA Nemotron 3 Super</h1>
          <a href="https://status.openrouter.ai/" target="_blank" class="status-pill" title="Check API Status">
            <span class="status-dot"></span>
            <span>API Online</span>
          </a>
        </div>

        <a class="icon-btn" href="../index.html" title="Back to Atlas">
          <i class="fas fa-arrow-left"></i>
        </a>
        
        <!-- Pulse loading progress indicator -->
        <div class="loading-bar" id="loadingBar"></div>
      </header>

      <section class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-row">
            <img class="hero-logo" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA logo">
          </div>
          <h2>Nemotron 3 Super</h2>
          <p>Advanced Reasoning for Real-World Impact.</p>

          <div class="quick-grid">
            <button class="quick" type="button" data-prompt="Create a futuristic landing page concept for an AI product.">
              <i class="fas fa-palette"></i>
              <span><strong>Design something</strong><span>Generate a sleek space-age UI idea.</span></span>
            </button>
            <button class="quick" type="button" data-prompt="Fix and improve this code. Explain the bugs clearly.">
              <i class="fas fa-bug"></i>
              <span><strong>Debug code</strong><span>Find issues and make it stronger.</span></span>
            </button>
            <button class="quick" type="button" data-prompt="Give me a 7-day study plan for learning AI development.">
              <i class="fas fa-calendar-alt"></i>
              <span><strong>Plan learning</strong><span>Turn a big goal into steps.</span></span>
            </button>
            <button class="quick" type="button" data-prompt="Write a creative space-themed story opening.">
              <i class="fas fa-feather-alt"></i>
              <span><strong>Write creatively</strong><span>Draft sharper futuristic text.</span></span>
            </button>
          </div>
        </div>

        <div class="thread" id="thread"></div>
      </section>

      <div class="composer-wrap">
        <div class="lock hidden" id="loginLock">Please continue with Google before sending messages.</div>
        <form class="composer" id="chatForm">
          <textarea id="prompt" placeholder="Transmit a message..." rows="1"></textarea>
          <button class="send" id="sendBtn" type="submit" title="Send">
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
      </div>
    </main>
  </div>

  <!-- Custom Popup Styles -->
  <style>
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .popup-overlay.active {
      opacity: 1;
    }
    .popup-card {
      background: #181818;
      border-radius: 28px;
      width: 340px;
      max-width: 90vw;
      padding: 24px;
      box-shadow: var(--shadow);
      transform: scale(0.95);
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .popup-overlay.active .popup-card {
      transform: scale(1);
    }
    .popup-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--text);
    }
    .popup-input {
      width: 100%;
      background: #2a2a2a;
      border: none;
      border-radius: 100px;
      padding: 12px 16px;
      color: white;
      font-size: 14px;
      margin: 16px 0;
      outline: none;
    }
    .popup-input:focus {
      background: #333;
    }
    .popup-text {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
      word-break: break-word;
    }
    .popup-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .popup-btn {
      padding: 8px 20px;
      border-radius: 100px;
      font-weight: 600;
      background: #2a2a2a;
      color: var(--text);
      transition: all 0.2s;
    }
    .popup-btn.primary {
      background: var(--cyan);
      color: #000;
    }
    .popup-btn.danger {
      background: var(--danger);
      color: white;
    }
    .popup-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    // Global popup manager

        return (b.updatedAt || 0) - (a.updatedAt || 0);

        dropdown.className = "dropdown-menu";

          <div class="dropdown-item" data-action="rename"><i class="fas fa-pen"></i> Rename</div>
          <div class="dropdown-item" data-action="delete"><i class="fas fa-trash"></i> Delete</div>
          <div class="dropdown-item" data-action="pin"><i class="fas fa-thumbtack"></i> ${chat.pinned ? 'Unpin' : 'Pin'}</div>
        `;
        
        dotsBtn.onclick = (e) => {
          e.stopPropagation();
          document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
            if(menu !== dropdown) menu.classList.remove('show');

          dropdown.classList.toggle('show');

        dropdown.querySelector('[data-action="rename"]').onclick = (e) => {

              const remaining = Object.keys(chats).filter(id => id !== chat.id);
              if(remaining.length > 0) currentChatId = remaining[0];
              else {
                currentChatId = makeId();

    function renderMessages(){
      const chat = currentChat();
      if(welcome) welcome.classList.toggle("hidden", chat.messages && chat.messages.length > 0);
      if(thread) thread.innerHTML = "";
      
      if(chat.messages && chat.messages.length > 0) {
        chat.messages.forEach((msg, index) => {

    function addMessageNodeWithVersions(msg, index){
      const row = document.createElement("div");
      row.className = "msg assistant";
      
      if(!msg.versions) {
        msg.versions = [msg.content || "No content"];
        msg.currentVersion = 0;
      }
      if(!msg.messageId) msg.messageId = makeMessageId();
      
      const currentContent = msg.versions[msg.currentVersion] || msg.content || "No content";
      const totalVersions = msg.versions.length;
      
      row.innerHTML =
        '<img class="avatar" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA">' +
        '<div><div class="bubble">' + marked.parse(currentContent) + '</div>' +
        '<div class="actions">' +
        '<div class="version-nav">' +
        '<button class="version-prev" ' + (msg.currentVersion === 0 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>' +
        '<span>' + (msg.currentVersion + 1) + '/' + totalVersions + '</span>' +
        '<button class="version-next" ' + (msg.currentVersion === totalVersions - 1 ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>' +
        '</div>' +
        '<button class="mini copy" type="button" title="Copy">' + icon("copy") + '</button>' +
        '<button class="mini retry" type="button" title="Try again">' + icon("retry") + '</button>' +
        '<button class="mini aloud" type="button" title="Read aloud">' + icon("audio") + '</button>' +
        '</div></div>';
      
      const prevBtn = row.querySelector(".version-prev");
      const nextBtn = row.querySelector(".version-next");
      const versionSpan = row.querySelector(".version-nav span");
      const bubble = row.querySelector(".bubble");
      
      if(prevBtn) {
        prevBtn.onclick = () => {
          if(msg.currentVersion > 0) {
            msg.currentVersion--;
            if(bubble) bubble.innerHTML = marked.parse(msg.versions[msg.currentVersion]);
            if(versionSpan) versionSpan.textContent = (msg.currentVersion + 1) + '/' + msg.versions.length;
            prevBtn.disabled = msg.currentVersion === 0;
            if(nextBtn) nextBtn.disabled = msg.currentVersion === msg.versions.length - 1;
            saveLocal();
            saveFirestore();
          }
        };
      }
      
      if(nextBtn) {
        nextBtn.onclick = () => {
          if(msg.currentVersion < msg.versions.length - 1) {
            msg.currentVersion++;
            if(bubble) bubble.innerHTML = marked.parse(msg.versions[msg.currentVersion]);
            if(versionSpan) versionSpan.textContent = (msg.currentVersion + 1) + '/' + msg.versions.length;
            if(prevBtn) prevBtn.disabled = msg.currentVersion === 0;
            nextBtn.disabled = msg.currentVersion === msg.versions.length - 1;
            saveLocal();
            saveFirestore();
          }
        };
      }
      
      const copyBtn = row.querySelector(".copy");
      if(copyBtn) copyBtn.onclick = async () => { try{await navigator.clipboard.writeText(msg.versions[msg.currentVersion])} catch(e){} };
      
      // Fixed: Passing bubble node directly to retryWithVersion
      const retryBtn = row.querySelector(".retry");
      if(retryBtn) retryBtn.onclick = () => retryWithVersion(index, bubble);
      
      const aloudBtn = row.querySelector(".aloud");
      if(aloudBtn) aloudBtn.onclick = () => {
        speechSynthesis.cancel();
        speechSynthesis.speak(new SpeechSynthesisUtterance(msg.versions[msg.currentVersion]));
      };
      
      if(thread) thread.appendChild(row);
      return row;
    }

    function addMessageNode(role, content, index){
      const row = document.createElement("div");
      row.className = "msg " + role;

      if(role === "assistant"){
        const msg = {content: content || "No content", versions: [content || "No content"], currentVersion: 0, messageId: makeMessageId()};
        return addMessageNodeWithVersions(msg, index);
      } else {
        // Consistent Copy button on user bubbles
        row.innerHTML = 
          '<div><div class="bubble">' + escapeHtml(content || "") + '</div>' +
          '<div class="actions justify-end">' +
          '<button class="mini copy" type="button" title="Copy">' + icon("copy") + '</button>' +
          '</div></div>';
        
        const copyBtn = row.querySelector(".copy");
        if(copyBtn) {
          copyBtn.onclick = async () => { 
            try { await navigator.clipboard.writeText(content); } catch(e) {} 
          };
        }
      }

      if(thread) thread.appendChild(row);
      return row;
    }

    function pushMessage(role, content){
      const chat = currentChat();
      const messageObj = {role, content: content || ""};
      
      if(role === "assistant") {
        messageObj.versions = [content || ""];
        messageObj.currentVersion = 0;
        messageObj.messageId = makeMessageId();
      }
      
      if(!chat.messages) chat.messages = [];
      chat.messages.push(messageObj);
      chat.updatedAt = Date.now();

      if(role === "user" && (chat.title === "New Chat" || !chat.title)){
        chat.title = (content || "New Chat").replace(/\s+/g, " ").trim().slice(0, 42) || "New Chat";
      }

      saveLocal();
      renderChats();
      saveFirestore();
    }

    function renderAll(){
      renderChats();
      renderMessages();
    }

    async function saveFirestore(){
      if(!currentUser) return;
      const chat = currentChat();
      try{
        await db.collection("users").doc(currentUser.uid).set({
          name: currentUser.displayName || "",
          email: currentUser.email || "",
          photoURL: currentUser.photoURL || "",
          lastModel: "NVIDIA Nemotron 3 Super",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge: true});

        await db.collection("users").doc(currentUser.uid).collection("chats").doc(chat.id).set({
          title: chat.title || "New Chat",
          model: MODEL,
          messages: chat.messages || [],
          pinned: chat.pinned || false,
          createdAt: chat.createdAt || Date.now(),
          updatedAt: chat.updatedAt || Date.now(),
          savedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge: true});
      } catch(error){ console.warn("Firestore save failed:", error); }
    }

    async function loadFirestoreChats(){
      if(!currentUser) return;
      try{
        const snap = await db.collection("users").doc(currentUser.uid).collection("chats").orderBy("updatedAt","desc").limit(30).get();
        snap.forEach(doc => {
          const data = doc.data();
          chats[doc.id] = {
            id: doc.id,
            title: data.title || "New Chat",
            messages: Array.isArray(data.messages) ? data.messages : [],
            pinned: data.pinned || false,
            createdAt: data.createdAt || Date.now(),
            updatedAt: data.updatedAt || Date.now()
          };
        });
        saveLocal();
        renderAll();
      } catch(error){ console.warn("Firestore load failed:", error); }
    }

    async function sendMessage(text){
      if(!currentUser){
        if(loginLock) loginLock.classList.remove("hidden");
        if(promptEl) promptEl.disabled = true;
        return;
      }

      if(!OPENROUTER_API_KEY || OPENROUTER_API_KEY.includes("PASTE_YOUR")){
        alert("Add your OpenRouter API key inside OPENROUTER_API_KEY first.");
        return;
      }

      const chat = currentChat();
      if(chat.messages.length === 0) {
        Object.keys(chats).forEach(chatId => {
          if(chats[chatId].messages.length === 0 && chatId !== currentChatId) {
            delete chats[chatId];
          }
        });
      }

      pushMessage("user", text);
      renderMessages();

      const assistantRow = document.createElement("div");
      assistantRow.className = "msg assistant";
      assistantRow.innerHTML = 
        '<img class="avatar" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA">' +
        '<div><div class="bubble typing-indicator" id="typingBubble">' +
        '<span></span><span></span><span></span>' +
        '</div><div class="actions hidden" id="assistantActions">' +
        '<button class="mini copy" type="button" title="Copy">' + icon("copy") + '</button>' +
        '<button class="mini retry" type="button" title="Try again">' + icon("retry") + '</button>' +
        '<button class="mini aloud" type="button" title="Read aloud">' + icon("audio") + '</button>' +
        '</div></div>';
      
      if(thread) thread.appendChild(assistantRow);
      if(welcome) welcome.classList.add("hidden");
      scrollBottom();

      isStreaming = true;
      aborter = new AbortController();
      if(sendBtn) {
        sendBtn.classList.add("stop");
        sendBtn.title = "Stop";
        sendBtn.innerHTML = '<i class="fas fa-stop"></i>';
      }

      // Activate loading pulse bar
      const loadingBar = $("loadingBar");
      if(loadingBar) loadingBar.classList.add("active");

      let assistantText = "";
      const typingBubble = document.getElementById("typingBubble");
      const assistantActions = document.getElementById("assistantActions");

      try{
        const chatMessages = currentChat().messages.map(m => ({role: m.role, content: m.content || ""}));

        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          signal: aborter.signal,
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + OPENROUTER_API_KEY,
            "HTTP-Referer": location.origin || location.href,
            "X-Title": "Atlas"
          },
          body: JSON.stringify({
            model: MODEL,
            stream: true,
            messages: [
              {role: "system", content: "You are NVIDIA Nemotron 3 Super inside Atlas. Be helpful, direct, creative, and clear."},
              ...chatMessages
            ]
          })
        });

        if(!res.ok) throw new Error(await res.text());

        if(typingBubble) {
          typingBubble.classList.remove("typing-indicator");
          typingBubble.innerHTML = "";
        }
        if(assistantActions) assistantActions.classList.remove("hidden");

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while(true){
          const {done, value} = await reader.read();
          if(done) break;

          buffer += decoder.decode(value, {stream: true});
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for(const line of lines){
            const trimmed = line.trim();
            if(!trimmed.startsWith("data:")) continue;

            const data = trimmed.slice(5).trim();
            if(data === "[DONE]") continue;

            try{
              const json = JSON.parse(data);
              const content = json.choices?.[0]?.delta?.content || "";
              if(content){
                assistantText += content;
                if(typingBubble) typingBubble.innerHTML = marked.parse(assistantText);
                scrollBottom();
              }
            } catch(e) {}
          }
        }

        if(!assistantText) assistantText = "I could not generate a response. Please try again.";
        if(typingBubble) typingBubble.innerHTML = marked.parse(assistantText);
        
        const currentChatData = currentChat();
        const messageId = makeMessageId();
        currentChatData.messages.push({
          role: "assistant", 
          content: assistantText,
          versions: [assistantText],
          currentVersion: 0,
          messageId: messageId
        });
        currentChatData.updatedAt = Date.now();
        
        if(currentChatData.title === "New Chat" || !currentChatData.title){
          currentChatData.title = (text || "New Chat").replace(/\s+/g, " ").trim().slice(0, 42) || "New Chat";
        }
        
        saveLocal();
        renderChats();
        saveFirestore();
        
        assistantRow.remove();
        renderMessages();
        
      } catch(error){
        if(error.name === "AbortError"){
          if(assistantText.trim()){
            const currentChatData = currentChat();
            currentChatData.messages.push({
              role: "assistant", 
              content: assistantText + "\n\n[Stopped]",
              versions: [assistantText + "\n\n[Stopped]"],
              currentVersion: 0,
              messageId: makeMessageId()
            });
            currentChatData.updatedAt = Date.now();
            saveLocal();
            renderChats();
            saveFirestore();
            assistantRow.remove();
            renderMessages();
          } else {
            if(typingBubble) {
              typingBubble.classList.remove("typing-indicator");
              typingBubble.innerHTML = marked.parse("Response stopped.");
            }
            if(assistantActions) assistantActions.classList.remove("hidden");
          }
        } else {
          if(typingBubble) {
            typingBubble.classList.remove("typing-indicator");
            typingBubble.innerHTML = marked.parse("Error: " + error.message);
          }
          if(assistantActions) assistantActions.classList.remove("hidden");
        }
      } finally{
        isStreaming = false;
        aborter = null;
        if(sendBtn) {
          sendBtn.classList.remove("stop");
          sendBtn.title = "Send";
          sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }
        if(loadingBar) loadingBar.classList.remove("active");
      }
    }

    // Fixed index mapping logic for retryWithVersion
    async function retryWithVersion(assistantIndex, bubble){
      if(isStreaming) return;

      const chat = currentChat();
      const assistantMsg = chat.messages[assistantIndex];
      
      if(!assistantMsg) return;
      
      let userIndex = assistantIndex - 1;
      while(userIndex >= 0 && chat.messages[userIndex].role !== "user") userIndex--;
      if(userIndex < 0) return;
      
      const userText = chat.messages[userIndex].content;
      
      if(!assistantMsg.versions) {
        assistantMsg.versions = [assistantMsg.content || ""];
        assistantMsg.currentVersion = 0;
      }
      if(!assistantMsg.messageId) assistantMsg.messageId = makeMessageId();
      
      if(bubble) {
        bubble.classList.add("typing-indicator");
        bubble.innerHTML = '<span></span><span></span><span></span>';
      }
      
      isStreaming = true;
      aborter = new AbortController();
      if(sendBtn) {
        sendBtn.classList.add("stop");
        sendBtn.title = "Stop";
        sendBtn.innerHTML = '<i class="fas fa-stop"></i>';
      }

      const loadingBar = $("loadingBar");
      if(loadingBar) loadingBar.classList.add("active");
      
      let newResponse = "";
      
      try{
        const messagesUpToUser = chat.messages.slice(0, userIndex + 1).map(m => ({role: m.role, content: m.content || ""}));
        
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          signal: aborter.signal,
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + OPENROUTER_API_KEY,
            "HTTP-Referer": location.origin || location.href,
            "X-Title": "Atlas"
          },
          body: JSON.stringify({
            model: MODEL,
            stream: true,
            messages: [
              {role: "system", content: "You are NVIDIA Nemotron 3 Super inside Atlas. Be helpful, direct, creative, and clear."},
              ...messagesUpToUser
            ]
          })
        });
        
        if(!res.ok) throw new Error(await res.text());
        
        if(bubble) {
          bubble.classList.remove("typing-indicator");
          bubble.innerHTML = "";
        }
        
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        
        while(true){
          const {done, value} = await reader.read();
          if(done) break;
          
          buffer += decoder.decode(value, {stream: true});
          const lines = buffer.split("\n");
          buffer = lines.pop();
          
          for(const line of lines){
            const trimmed = line.trim();
            if(!trimmed.startsWith("data:")) continue;
            
            const data = trimmed.slice(5).trim();
            if(data === "[DONE]") continue;
            
            try{
              const json = JSON.parse(data);
              const content = json.choices?.[0]?.delta?.content || "";
              if(content){
                newResponse += content;
                if(bubble) bubble.innerHTML = marked.parse(newResponse);
                scrollBottom();
              }
            } catch(e) {}
          }
        }
        
        if(!newResponse) newResponse = "Could not generate new response.";
        
        assistantMsg.versions.push(newResponse);
        assistantMsg.currentVersion = assistantMsg.versions.length - 1;
        assistantMsg.content = newResponse;
        chat.updatedAt = Date.now();
        
        saveLocal();
        saveFirestore();
        
        renderMessages();
        
      } catch(error){
        if(error.name !== "AbortError"){
          if(bubble) {
            bubble.classList.remove("typing-indicator");
            bubble.innerHTML = marked.parse("Error: " + error.message);
          }
        }
      } finally{
        isStreaming = false;
        aborter = null;
        if(sendBtn) {
          sendBtn.classList.remove("stop");
          sendBtn.title = "Send";
          sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }
        if(loadingBar) loadingBar.classList.remove("active");
      }
    }

    form.addEventListener("submit", e => {
      e.preventDefault();
      if(isStreaming && aborter){
        aborter.abort();
        return;
      }
      const text = promptEl.value.trim();
      if(!text) return;
      sendMessage(text);
      promptEl.value = "";
      // Cleanly reset prompt textarea height post-submit
      promptEl.style.height = "56px";
    });

    // Auto-grow textarea height
    function autoGrowPrompt() {
      promptEl.style.height = 'auto';
      promptEl.style.height = promptEl.scrollHeight + 'px';
    }
    promptEl.addEventListener('input', autoGrowPrompt);

    // Pressing Enter submits form directly, Shift+Enter inserts newline
    promptEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    // Sidebar Toggles
    const openSide = $("openSide");
    const closeSide = $("closeSide");
    if(openSide) openSide.onclick = () => sidebar.classList.add("open");
    if(closeSide) closeSide.onclick = () => sidebar.classList.remove("open");

    // Google Login popup trigger
    if(googleLogin) {
      googleLogin.onclick = async () => {
        try {
          await auth.signInWithPopup(provider);
        } catch (error) {
          console.error("Google login failed:", error);
          alert("Login failed: " + error.message);
        }
      };
    }

    // Google Sign Out trigger
    if(userBox) {
      userBox.onclick = () => {
        showPopup("Sign Out", "Are you sure you want to sign out?", async () => {
          try {
            await auth.signOut();
          } catch(error) {
            console.error("Sign out failed:", error);
          }
        }, "Sign Out", true);
      };
    }

    // Initialize New Chat
    const newChatBtn = $("newChat");
    if(newChatBtn) {
      newChatBtn.onclick = () => {
        currentChatId = makeId();
        saveLocal();
        renderAll();
        promptEl.focus();
        if(window.innerWidth <= 900) sidebar.classList.remove("open");
      };
    }

    // Quick prompt chip listener - fills prompt AND submits
    document.querySelectorAll(".quick").forEach(btn => {
      btn.onclick = () => {
        const text = btn.getAttribute("data-prompt");
        if(text) {
          promptEl.value = text;
          autoGrowPrompt();
          form.requestSubmit();
        }
      };
    });

    // Firebase Auth Observer with proper state guards to avoid race conditions
    auth.onAuthStateChanged(user => {
      if(user) {
        currentUser = user;
        if(loginLock) loginLock.classList.add("hidden");
        if(promptEl) promptEl.disabled = false;
        if(googleLogin) googleLogin.classList.add("hidden");
        if(userBox) {
          userBox.classList.remove("hidden");
          if(userPic) userPic.src = user.photoURL || "";
          if(fullName) fullName.textContent = user.displayName || "User";
          if(userEmail) userEmail.textContent = user.email || "";
        }
        loadFirestoreChats();
      } else {
        currentUser = null;
        if(loginLock) loginLock.classList.remove("hidden");
        if(promptEl) {
          promptEl.disabled = true;
          promptEl.value = "";
          promptEl.style.height = "56px";
        }
        if(googleLogin) googleLogin.classList.remove("hidden");
        if(userBox) userBox.classList.add("hidden");
        chats = safeJSON(localStorage.getItem("nemotron_chats"), {});
        currentChatId = localStorage.getItem("nemotron_current_chat") || makeId();
        renderAll();
      }
    });

    // Dynamic background loading from bg.json, fallback to radial gradient
    async function loadBackground() {
      try {
        const response = await fetch('bg.json');
        if(response.ok) {
          const bgData = await response.json();
          if(bgData.background) {
            document.body.style.background = bgData.background;
          }
          if(bgData.colors) {
            const root = document.documentElement;
            Object.entries(bgData.colors).forEach(([key, val]) => {
              root.style.setProperty(`--${key}`, val);
            });
          }
        } else {
          setFallbackBackground();
        }
      } catch(e) {
        setFallbackBackground();
      }
    }

    function setFallbackBackground() {
      document.body.style.background = "radial-gradient(circle at 50% 50%, #0a1128 0%, #05070d 100%)";
    }

    // Start Page Setup
    loadBackground();
    if(!currentUser){
      renderAll();
    }
  </script>
</body>
</html>

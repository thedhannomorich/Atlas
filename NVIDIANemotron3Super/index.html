<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVIDIA Nemotron 3 Super</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#05070d;
      --bg2:#080d16;
      --panel:rgba(12,18,31,.78);
      --panel2:rgba(17,25,42,.86);
      --glass:rgba(255,255,255,.055);
      --hover:rgba(255,255,255,.09);
      --text:#f5f8ff;
      --muted:#96a3b8;
      --soft:#c7d3e8;
      --line:rgba(167,192,255,.16);
      --cyan:#42e8ff;
      --green:#76ff7a;
      --pink:#ff5bd7;
      --yellow:#ffd166;
      --danger:#ff4d6d;
      --radius:8px;
      --shadow:0 24px 80px rgba(0,0,0,.55);
    }

    html,body{height:100%}
    body{
      overflow:hidden;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background: url('bg.gif') center/cover no-repeat fixed;
    }

    button,input,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}
    svg{width:19px;height:19px;flex:0 0 auto}

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:310px minmax(0,1fr);
      position:relative;
      z-index:1;
    }

    .sidebar{
      height:100vh;
      min-width:0;
      display:flex;
      flex-direction:column;
      border-right:1px solid var(--line);
      background:rgba(3, 5, 9, 0.76);
      backdrop-filter:blur(24px);
    }

    .side-head,.top{
      height:76px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--line);
    }

    .side-head{padding:0 16px}
    .top{
      padding:0 22px;
      background:rgba(5,8,14,.52);
      backdrop-filter:blur(22px);
    }

    .brand,.model-title,.status-pill{display:flex;align-items:center}
    .brand{gap:12px;min-width:0}
    .model-title{gap:13px;min-width:0}
    .brand span,.model-title h1{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand span{font-size:22px;font-weight:900}
    .model-title h1{font-size:21px;font-weight:900}

    .logo,.hero-logo,.avatar{
      object-fit:contain;
    }
    .logo,.hero-logo{
      width:42px;
      height:42px;
      border-radius:8px;
      padding:5px;
      background: transparent !important;
    }
    .avatar{width:34px;height:34px;border-radius:50%;padding:4px}

    /* ALL BORDERS REMOVED - no border colors, no box borders */
    .icon-btn,.mini,.send,.new-chat,.chip,.google-btn,.user-btn,
    .chat-item,.quick,.bubble,.composer-wrap,.side-title,.account,
    .status-pill,.lock,textarea,.side-head,.top,.sidebar{
      border: none !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }

    .icon-btn,.mini,.send,.new-chat,.google-btn,.user-btn{
      border-radius: 100px !important; /* capsule shape */
      transition:transform .18s ease,background .18s ease;
    }

    .icon-btn,.mini{
      background: #181818;
      color: var(--text);
      display:grid;
      place-items:center;
    }
    .icon-btn{width:40px;height:40px}
    .mini{width:34px;height:34px}
    .icon-btn:hover,.mini:hover{
      transform:translateY(-1px);
      background: #303030;
      color: var(--text);
    }

    .new-chat{
      height:48px;
      margin:14px;
      background: #181818;
      color:var(--text);
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      border-radius: 100px !important;
    }
    .new-chat:hover{
      transform:translateY(-1px);
      background: #303030;
    }

    .side-title{
      padding:13px 16px 9px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0;
      background: transparent;
    }

    .chat-list{flex:1;overflow:auto;padding:0 10px 12px}
    .chat-item{
      width:100%;
      min-height:44px;
      border-radius: 100px !important;
      background: #181818;
      color:var(--soft);
      padding:10px 16px;
      text-align:left;
      display:flex;
      align-items:center;
      gap:9px;
      margin-bottom:4px;
    }
    .chat-item:hover{
      background: #303030;
      color:var(--text);
    }
    .chat-item.active{
      background: #494949;
      color:var(--text);
    }
    .chat-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}

    .account{padding:13px 14px 16px}
    .google-btn,.user-btn{
      width:100%;
      min-height:47px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 16px;
      border-radius: 100px !important;
    }
    .google-btn{
      background: #181818;
      color:var(--text);
      font-weight:800;
      justify-content:center;
    }
    .google-btn:hover{
      background: #303030;
    }
    .user-btn{
      background: #181818;
      color:var(--text);
      text-align:left;
    }
    .user-btn:hover{
      background: #303030;
    }
    .user-btn img{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#dbeafe}
    .user-name,.user-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-name{font-weight:800;font-size:14px}
    .user-email{font-size:12px;color:var(--muted)}

    .main{height:100vh;display:flex;flex-direction:column;min-width:0}
    .menu-btn{display:none}

    .status-pill{
      gap:8px;
      height:34px;
      padding:0 11px;
      border-radius: 100px !important;
      color:#d9ffe2;
      background: #181818;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .status-pill:hover{
      background: #303030;
    }
    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
    }

    .messages{
      flex:1;
      overflow:auto;
      padding:32px 22px 24px;
      scroll-behavior:smooth;
    }

    .welcome{
      max-width:900px;
      margin:0 auto 26px;
      text-align:center;
      padding-top:34px;
    }
    .welcome-row{display:flex;justify-content:center;align-items:center;margin-bottom:20px}
    .welcome h2{
      font-size:clamp(34px,5vw,64px);
      line-height:1.02;
      font-weight:900;
      background:white;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .welcome p{
      max-width:620px;
      margin:14px auto 0;
      color:var(--muted);
      font-size:17px;
      line-height:1.6;
    }

    .quick-grid{
      max-width:900px;
      margin:28px auto 0;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .quick{
      min-height:76px;
      border-radius: 100px !important;
      background: #181818;
      color:var(--text);
      padding:15px 20px;
      text-align:left;
      display:flex;
      gap:12px;
      align-items:center;
    }
    .quick:hover{
      background: #303030;
      transform:translateY(-1px);
    }
    .quick strong{display:block;font-size:14px;margin-bottom:4px}
    .quick span{display:block;font-size:13px;color:var(--muted);line-height:1.35}

    .thread{
      max-width:900px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .msg{display:flex;gap:12px;align-items:flex-start}
    .msg.user{justify-content:flex-end}

    .bubble{
      max-width:min(720px,88%);
      border-radius: 24px !important;
      padding:14px 18px;
      line-height:1.65;
      font-size:15px;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
      background: #181818;
      color: var(--text);
    }
    .user .bubble{
      background: #494949;
    }
    .assistant .bubble{
      background: #181818;
    }
    .actions{display:flex;gap:8px;margin-top:9px}

    .composer-wrap{
      padding:14px 22px 22px;
      background:rgba(5,8,14,.68);
      backdrop-filter:blur(22px);
    }
    .lock{
      max-width:900px;
      margin:0 auto 12px;
      background:#f8baba;
      color:#f80000;
      padding:11px 13px;
      border-radius: 100px !important;
      font-size:14px;
      text-align:center;
    }
    .composer{
      max-width:900px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 54px;
      gap:10px;
      align-items:end;
    }
    textarea{
      height:56px;
      max-height:190px;
      resize:none;
      border-radius: 100px !important;
      background: #181818;
      color:var(--text);
      padding:17px 20px;
      outline:none;
      font-size:15px;
      line-height:1.45;
    }
    textarea:focus{
      background: #303030;
    }
    textarea:disabled{opacity:.6}
    .send{
      height:56px;
      background: #181818;
      color:#ffffff;
      font-weight:900;
      display:grid;
      place-items:center;
      border-radius: 100px !important;
    }
    .send:hover{
      transform:translateY(-1px);
      background: #303030;
    }
    .send.stop{
      background: #494949;
      color:#fff;
    }

    .hidden{display:none!important}

    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:fixed;
        inset:0 auto 0 0;
        width:min(314px,86vw);
        z-index:20;
        transform:translateX(-105%);
        transition:transform .22s ease;
      }
      .sidebar.open{transform:translateX(0)}
      .menu-btn{display:grid}
      .top{padding:0 14px}
      .model-title h1{font-size:17px}
      .status-pill{display:none}
      .messages{padding:22px 12px}
      .composer-wrap{padding:12px}
      .bubble{max-width:92%}
      .quick-grid{grid-template-columns:1fr}
    }

    .typing-indicator {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 12px 18px;
      background: #181818;
      border-radius: 100px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-10px); opacity: 1; }
    }
</style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <div class="brand">
          <img class="logo" src="../assets/logo.png" alt="Atlas logo" onerror="this.src='https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256'">
          <span>Atlas</span>
        </div>
        <button class="icon-btn" id="closeSide" title="Close sidebar" type="button">

        </button>
      </div>

      <button class="new-chat" id="newChat" type="button">
        <i class="fas fa-plus"></i>
        New Chat
      </button>

      <div class="side-title">Previous Chats</div>
      <div class="chat-list" id="chatList"></div>

      <div class="account">
        <button class="google-btn" id="googleLogin" type="button">
          <i class="fab fa-google" style="font-size: 19px; margin-right: 8px;"></i>
          Continue with Google
        </button>

        <button class="user-btn hidden" id="userBox" title="Click to sign out" type="button">
          <img id="userPic" alt="User profile">
          <div style="min-width:0">
            <div class="user-name" id="fullName"></div>
            <div class="user-email" id="userEmail"></div>
          </div>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="top">
        <button class="icon-btn menu-btn" id="openSide" title="Open sidebar" type="button">
          <i class="fas fa-bars"></i>
        </button>

        <div class="model-title">
          <img class="hero-logo" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA logo">
          <h1>NVIDIA Nemotron 3 Super</h1>
        </div>

        <a class="icon-btn" href="../index.html" title="Back to Atlas">
          <i class="fas fa-arrow-left"></i>
        </a>
      </header>

      <section class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-row">
            <img class="hero-logo" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA logo">
          </div>
          <h2>Nemotron 3 Super</h2>
          <p>Advanced Reasoning for Real-World Impact.</p>

          <div class="quick-grid">
            <button class="quick" type="button" data-prompt="Create a futuristic landing page concept for an AI product.">
              <i class="fas fa-palette"></i>
              <span><strong>Design something</strong><span>Generate a sleek space-age UI idea.</span></span>
            </button>
            <button class="quick" type="button" data-prompt="Fix and improve this code. Explain the bugs clearly.">
              <i class="fas fa-bug"></i>
              <span><strong>Debug code</strong><span>Find issues and make it stronger.</span></span>
            </button>
            <button class="quick" type="button" data-prompt="Give me a 7-day study plan for learning AI development.">
              <i class="fas fa-calendar-alt"></i>
              <span><strong>Plan learning</strong><span>Turn a big goal into steps.</span></span>
            </button>
            <button class="quick" type="button" data-prompt="Write a creative space-themed story opening.">
              <i class="fas fa-feather-alt"></i>
              <span><strong>Write creatively</strong><span>Draft sharper futuristic text.</span></span>

        <div class="thread" id="thread"></div>

      <div class="composer-wrap">
        <div class="lock hidden" id="loginLock">Please continue with Google before sending messages.</div>
        <form class="composer" id="chatForm">
          <textarea id="prompt" placeholder="Transmit a message..." rows="1"></textarea>
          <button class="send" id="sendBtn" type="submit" title="Send">
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>

  </div>

  <style>
    /* Custom scrollbar for messages */
    .messages::-webkit-scrollbar {
      width: 6px;
    }
    .messages::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }
    .messages::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    /* Version navigation buttons */
    .version-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-right: 12px;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
    }
    .version-nav button {
      background: none;
      border: none;
      color: var(--cyan);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .version-nav button:hover {
      background: rgba(66, 232, 255, 0.2);
      transform: scale(1.05);
    }
    .version-nav span {
      color: var(--soft);
      font-family: monospace;
      font-size: 12px;
    }
    .version-nav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>

  <script>
    const OPENROUTER_API_KEY = "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";
    const MODEL = "nvidia/nemotron-3-super-120b-a12b:free";

    const firebaseConfig = {
      apiKey: "AIzaSyA8jOSZR4Z7QtYUq4B5L1UIpL4_LWOQJb8",
      authDomain: "bdatlasai.firebaseapp.com",
      projectId: "bdatlasai",
      storageBucket: "bdatlasai.firebasestorage.app",
      messagingSenderId: "1021100223861",
      appId: "1:1021100223861:web:dd34c5ccda087a701fb73c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    const $ = id => document.getElementById(id);
    const sidebar = $("sidebar");
    const chatList = $("chatList");
    const thread = $("thread");
    const welcome = $("welcome");
    const messagesEl = $("messages");
    const promptEl = $("prompt");
    const form = $("chatForm");
    const sendBtn = $("sendBtn");
    const loginLock = $("loginLock");
    const googleLogin = $("googleLogin");
    const userBox = $("userBox");
    const userPic = $("userPic");
    const fullName = $("fullName");
    const userEmail = $("userEmail");

    let currentUser = null;
    let currentChatId = localStorage.getItem("nemotron_current_chat") || makeId();
    let chats = safeJSON(localStorage.getItem("nemotron_chats"), {});
    let aborter = null;
    let isStreaming = false;

    function makeId(){
      return "chat_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
    }
    
    function makeMessageId(){
      return "msg_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
    }

    function safeJSON(value, fallback){
      try{return JSON.parse(value) || fallback}
      catch{return fallback}
    }

    function saveLocal(){
      localStorage.setItem("nemotron_current_chat", currentChatId);
      localStorage.setItem("nemotron_chats", JSON.stringify(chats));
    }

    function currentChat(){
      if(!chats[currentChatId]){
        // Check if there's already an empty chat (no messages) that we can use
        const existingEmptyChat = Object.values(chats).find(chat => chat.messages && chat.messages.length === 0);
        
        if(existingEmptyChat) {
          // Use existing empty chat instead of creating new one
          currentChatId = existingEmptyChat.id;
          return existingEmptyChat;
        }
        
        // Only create new chat if no empty chat exists
        chats[currentChatId] = {
          id: currentChatId,
          title: "New Chat",
          messages: [],
          createdAt: Date.now(),
          updatedAt: Date.now()
        };
      }
      
      // Ensure messages array exists
      if(!chats[currentChatId].messages) {
        chats[currentChatId].messages = [];
      }
      
      return chats[currentChatId];
    }

    function escapeHtml(text){
      if(!text) return '';
      return String(text).replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function scrollBottom(){
      requestAnimationFrame(() => {
        if(messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function icon(name){
      const icons = {
        copy: '<i class="fas fa-copy"></i>',
        retry: '<i class="fas fa-redo-alt"></i>',
        audio: '<i class="fas fa-volume-up"></i>'
      };
      return icons[name] || '';
    }

    function renderChats(){
      if(!chatList) return;
      
      const list = Object.values(chats).sort((a,b)=>(b.updatedAt || 0) - (a.updatedAt || 0));
      chatList.innerHTML = list.length ? "" : '<div style="padding:12px;color:var(--muted);font-size:14px">No previous chats.</div>';

      list.forEach(chat => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
        btn.innerHTML = '<i class="fas fa-comment"></i><span>' + escapeHtml(chat.title || "New Chat") + '</span>';
        btn.onclick = () => {
          currentChatId = chat.id;
          saveLocal();
          renderAll();
          if(window.innerWidth <= 900) sidebar.classList.remove("open");
        };
        chatList.appendChild(btn);
      });
    }

    function renderMessages(){
      const chat = currentChat();
      if(welcome) welcome.classList.toggle("hidden", chat.messages && chat.messages.length > 0);
      if(thread) thread.innerHTML = "";
      
      if(chat.messages && chat.messages.length > 0) {
        chat.messages.forEach((msg, index) => {
          if(msg.role === "assistant") {
            addMessageNodeWithVersions(msg, index);
          } else {
            addMessageNode(msg.role, msg.content, index);
          }
        });
      }
      scrollBottom();
    }
    
    function addMessageNodeWithVersions(msg, index){
      const row = document.createElement("div");
      row.className = "msg assistant";
      
      // Ensure message has versions array
      if(!msg.versions) {
        msg.versions = [msg.content || "No content"];
        msg.currentVersion = 0;
      }
      if(!msg.messageId) msg.messageId = makeMessageId();
      
      const currentContent = msg.versions[msg.currentVersion] || msg.content || "No content";
      const totalVersions = msg.versions.length;
      
      row.innerHTML =
        '<img class="avatar" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA">' +
        '<div><div class="bubble">' + escapeHtml(currentContent) + '</div>' +
        '<div class="actions">' +
        '<div class="version-nav">' +
        '<button class="version-prev" ' + (msg.currentVersion === 0 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>' +
        '<span>' + (msg.currentVersion + 1) + '/' + totalVersions + '</span>' +
        '<button class="version-next" ' + (msg.currentVersion === totalVersions - 1 ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>' +
        '</div>' +
        '<button class="mini copy" type="button" title="Copy">' + icon("copy") + '</button>' +
        '<button class="mini retry" type="button" title="Try again">' + icon("retry") + '</button>' +
        '<button class="mini aloud" type="button" title="Read aloud">' + icon("audio") + '</button>' +
        '</div></div>';
      
      // Version navigation
      const prevBtn = row.querySelector(".version-prev");
      const nextBtn = row.querySelector(".version-next");
      const versionSpan = row.querySelector(".version-nav span");
      const bubble = row.querySelector(".bubble");
      
      if(prevBtn) {
        prevBtn.onclick = () => {
          if(msg.currentVersion > 0) {
            msg.currentVersion--;
            if(bubble) bubble.innerHTML = escapeHtml(msg.versions[msg.currentVersion]);
            if(versionSpan) versionSpan.textContent = (msg.currentVersion + 1) + '/' + msg.versions.length;
            
            // Update button states
            prevBtn.disabled = msg.currentVersion === 0;
            if(nextBtn) nextBtn.disabled = msg.currentVersion === msg.versions.length - 1;
            
            saveLocal();
            saveFirestore();
          }
        };
      }
      
      if(nextBtn) {
        nextBtn.onclick = () => {
          if(msg.currentVersion < msg.versions.length - 1) {
            msg.currentVersion++;
            if(bubble) bubble.innerHTML = escapeHtml(msg.versions[msg.currentVersion]);
            if(versionSpan) versionSpan.textContent = (msg.currentVersion + 1) + '/' + msg.versions.length;
            
            // Update button states
            if(prevBtn) prevBtn.disabled = msg.currentVersion === 0;
            nextBtn.disabled = msg.currentVersion === msg.versions.length - 1;
            
            saveLocal();
            saveFirestore();
          }
        };
      }
      
      const copyBtn = row.querySelector(".copy");
      if(copyBtn) {
        copyBtn.onclick = async () => {
          try{await navigator.clipboard.writeText(msg.versions[msg.currentVersion])}
          catch{console.error("Copy failed.")}
        };
      }
      
      const retryBtn = row.querySelector(".retry");
      if(retryBtn) {
        retryBtn.onclick = () => retryWithVersion(index);
      }
      
      const aloudBtn = row.querySelector(".aloud");
      if(aloudBtn) {
        aloudBtn.onclick = () => {
          speechSynthesis.cancel();
          speechSynthesis.speak(new SpeechSynthesisUtterance(msg.versions[msg.currentVersion]));
        };
      }
      
      if(thread) thread.appendChild(row);
      return row;
    }

    function addMessageNode(role, content, index){
      const row = document.createElement("div");
      row.className = "msg " + role;

      if(role === "assistant"){
        // Legacy support for old messages without versions
        const msg = {content: content || "No content", versions: [content || "No content"], currentVersion: 0, messageId: makeMessageId()};
        return addMessageNodeWithVersions(msg, index);
      } else {
        row.innerHTML = '<div class="bubble">' + escapeHtml(content || "") + '</div>';
      }

      if(thread) thread.appendChild(row);
      return row;
    }

    function pushMessage(role, content){
      const chat = currentChat();
      const messageObj = {role, content: content || ""};
      
      if(role === "assistant") {
        messageObj.versions = [content || ""];
        messageObj.currentVersion = 0;
        messageObj.messageId = makeMessageId();
      }
      
      if(!chat.messages) chat.messages = [];
      chat.messages.push(messageObj);
      chat.updatedAt = Date.now();

      if(role === "user" && (chat.title === "New Chat" || !chat.title)){
        chat.title = (content || "New Chat").replace(/\s+/g, " ").trim().slice(0, 42) || "New Chat";
      }

      saveLocal();
      renderChats();
      saveFirestore();
    }

    function renderAll(){
      renderChats();
      renderMessages();
    }

    async function saveFirestore(){
      if(!currentUser) return;

      const chat = currentChat();
      try{
        await db.collection("users").doc(currentUser.uid).set({
          name: currentUser.displayName || "",
          email: currentUser.email || "",
          photoURL: currentUser.photoURL || "",
          lastModel: "NVIDIA Nemotron 3 Super",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge: true});

        await db.collection("users").doc(currentUser.uid).collection("chats").doc(chat.id).set({
          title: chat.title || "New Chat",
          model: MODEL,
          messages: chat.messages || [],
          createdAt: chat.createdAt || Date.now(),
          updatedAt: chat.updatedAt || Date.now(),
          savedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge: true});
      } catch(error){
        console.warn("Firestore save failed:", error);
      }
    }

    async function loadFirestoreChats(){
      if(!currentUser) return;

      try{
        const snap = await db.collection("users").doc(currentUser.uid).collection("chats").orderBy("updatedAt","desc").limit(30).get();
        snap.forEach(doc => {
          const data = doc.data();
          chats[doc.id] = {
            id: doc.id,
            title: data.title || "New Chat",
            messages: Array.isArray(data.messages) ? data.messages : [],
            createdAt: data.createdAt || Date.now(),
            updatedAt: data.updatedAt || Date.now()
          };
        });
        saveLocal();
        renderAll();
      } catch(error){
        console.warn("Firestore load failed:", error);
      }
    }

    async function sendMessage(text){
      if(!currentUser){
        if(loginLock) loginLock.classList.remove("hidden");
        if(promptEl) promptEl.disabled = true;
        return;
      }

      if(!OPENROUTER_API_KEY || OPENROUTER_API_KEY.includes("PASTE_YOUR")){
        alert("Add your OpenRouter API key inside OPENROUTER_API_KEY first.");
        return;
      }

      // Clean up any other empty chats when sending first message
      const chat = currentChat();
      if(chat.messages.length === 0) {
        Object.keys(chats).forEach(chatId => {
          if(chats[chatId].messages.length === 0 && chatId !== currentChatId) {
            delete chats[chatId];
          }
        });
      }

      pushMessage("user", text);
      renderMessages();

      // Create assistant message with typing animation
      const assistantRow = document.createElement("div");
      assistantRow.className = "msg assistant";
      assistantRow.innerHTML = 
        '<img class="avatar" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA">' +
        '<div><div class="bubble typing-indicator" id="typingBubble">' +
        '<span></span><span></span><span></span>' +
        '</div><div class="actions hidden" id="assistantActions">' +
        '<button class="mini copy" type="button" title="Copy">' + icon("copy") + '</button>' +
        '<button class="mini retry" type="button" title="Try again">' + icon("retry") + '</button>' +
        '<button class="mini aloud" type="button" title="Read aloud">' + icon("audio") + '</button>' +
        '</div></div>';
      
      if(thread) thread.appendChild(assistantRow);
      if(welcome) welcome.classList.add("hidden");
      scrollBottom();

      isStreaming = true;
      aborter = new AbortController();
      if(sendBtn) {
        sendBtn.classList.add("stop");
        sendBtn.title = "Stop";
        sendBtn.innerHTML = '<i class="fas fa-stop"></i>';
      }

      let assistantText = "";
      const typingBubble = document.getElementById("typingBubble");
      const assistantActions = document.getElementById("assistantActions");

      try{
        const chatMessages = currentChat().messages.map(m => ({role: m.role, content: m.content || ""}));

        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          signal: aborter.signal,
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + OPENROUTER_API_KEY,
            "HTTP-Referer": location.origin || location.href,
            "X-Title": "Atlas"
          },
          body: JSON.stringify({
            model: MODEL,
            stream: true,
            messages: [
              {role: "system", content: "You are NVIDIA Nemotron 3 Super inside Atlas. Be helpful, direct, creative, and clear."},
              ...chatMessages
            ]
          })
        });

        if(!res.ok) throw new Error(await res.text());

        // Replace typing indicator with empty bubble for streaming
        if(typingBubble) {
          typingBubble.classList.remove("typing-indicator");
          typingBubble.innerHTML = "";
        }
        if(assistantActions) assistantActions.classList.remove("hidden");

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while(true){
          const {done, value} = await reader.read();
          if(done) break;

          buffer += decoder.decode(value, {stream: true});
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for(const line of lines){
            const trimmed = line.trim();
            if(!trimmed.startsWith("data:")) continue;

            const data = trimmed.slice(5).trim();
            if(data === "[DONE]") continue;

            try{
              const json = JSON.parse(data);
              const content = json.choices?.[0]?.delta?.content || "";
              if(content){
                assistantText += content;
                if(typingBubble) typingBubble.textContent = assistantText;
                scrollBottom();
              }
            } catch(e) {}
          }
        }

        if(!assistantText) assistantText = "I could not generate a response. Please try again.";
        if(typingBubble) typingBubble.textContent = assistantText;
        
        // Save to chat with versions support
        const currentChatData = currentChat();
        const messageId = makeMessageId();
        currentChatData.messages.push({
          role: "assistant", 
          content: assistantText,
          versions: [assistantText],
          currentVersion: 0,
          messageId: messageId
        });
        currentChatData.updatedAt = Date.now();
        
        if(currentChatData.title === "New Chat" || !currentChatData.title){
          currentChatData.title = (text || "New Chat").replace(/\s+/g, " ").trim().slice(0, 42) || "New Chat";
        }
        
        saveLocal();
        renderChats();
        saveFirestore();
        
        // Remove the temporary row and re-render properly
        assistantRow.remove();
        renderMessages();
        
      } catch(error){
        if(error.name === "AbortError"){
          if(assistantText.trim()){
            const currentChatData = currentChat();
            currentChatData.messages.push({
              role: "assistant", 
              content: assistantText + "\n\n[Stopped]",
              versions: [assistantText + "\n\n[Stopped]"],
              currentVersion: 0,
              messageId: makeMessageId()
            });
            currentChatData.updatedAt = Date.now();
            saveLocal();
            renderChats();
            saveFirestore();
            assistantRow.remove();
            renderMessages();
          } else {
            if(typingBubble) {
              typingBubble.classList.remove("typing-indicator");
              typingBubble.textContent = "Response stopped.";
            }
            if(assistantActions) assistantActions.classList.remove("hidden");
          }
        } else {
          if(typingBubble) {
            typingBubble.classList.remove("typing-indicator");
            typingBubble.textContent = "Error: " + error.message;
          }
          if(assistantActions) assistantActions.classList.remove("hidden");
        }
      } finally{
        isStreaming = false;
        aborter = null;
        if(sendBtn) {
          sendBtn.classList.remove("stop");
          sendBtn.title = "Send";
          sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }
      }
    }

    async function retryWithVersion(assistantIndex){
      if(isStreaming) return;

      const chat = currentChat();
      const assistantMsg = chat.messages[assistantIndex];
      
      if(!assistantMsg) return;
      
      // Find the corresponding user message
      let userIndex = assistantIndex - 1;
      while(userIndex >= 0 && chat.messages[userIndex].role !== "user") userIndex--;
      if(userIndex < 0) return;
      
      const userText = chat.messages[userIndex].content;
      
      // Store current content before retry if not already in versions
      if(!assistantMsg.versions) {
        assistantMsg.versions = [assistantMsg.content || ""];
        assistantMsg.currentVersion = 0;
      }
      if(!assistantMsg.messageId) assistantMsg.messageId = makeMessageId();
      
      // Find the bubble element for this specific message
      const allBubbles = document.querySelectorAll('.msg.assistant .bubble');
      const bubble = allBubbles[assistantIndex];
      
      if(bubble) {
        bubble.classList.add("typing-indicator");
        bubble.innerHTML = '<span></span><span></span><span></span>';
      }
      
      isStreaming = true;
      aborter = new AbortController();
      if(sendBtn) {
        sendBtn.classList.add("stop");
        sendBtn.title = "Stop";
        sendBtn.innerHTML = '<i class="fas fa-stop"></i>';
      }
      
      let newResponse = "";
      
      try{
        // Build messages up to the user message
        const messagesUpToUser = chat.messages.slice(0, userIndex + 1).map(m => ({role: m.role, content: m.content || ""}));
        
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          signal: aborter.signal,
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + OPENROUTER_API_KEY,
            "HTTP-Referer": location.origin || location.href,
            "X-Title": "Atlas"
          },
          body: JSON.stringify({
            model: MODEL,
            stream: true,
            messages: [
              {role: "system", content: "You are NVIDIA Nemotron 3 Super inside Atlas. Be helpful, direct, creative, and clear."},
              ...messagesUpToUser
            ]
          })
        });
        
        if(!res.ok) throw new Error(await res.text());
        
        // Clear typing indicator
        if(bubble) {
          bubble.classList.remove("typing-indicator");
          bubble.innerHTML = "";
        }
        
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        
        while(true){
          const {done, value} = await reader.read();
          if(done) break;
          
          buffer += decoder.decode(value, {stream: true});
          const lines = buffer.split("\n");
          buffer = lines.pop();
          
          for(const line of lines){
            const trimmed = line.trim();
            if(!trimmed.startsWith("data:")) continue;
            
            const data = trimmed.slice(5).trim();
            if(data === "[DONE]") continue;
            
            try{
              const json = JSON.parse(data);
              const content = json.choices?.[0]?.delta?.content || "";
              if(content){
                newResponse += content;
                if(bubble) bubble.textContent = newResponse;
                scrollBottom();
              }
            } catch(e) {}
          }
        }
        
        if(!newResponse) newResponse = "Could not generate new response.";
        
        // Add new version
        assistantMsg.versions.push(newResponse);
        assistantMsg.currentVersion = assistantMsg.versions.length - 1;
        assistantMsg.content = newResponse;
        chat.updatedAt = Date.now();
        
        saveLocal();
        saveFirestore();
        
        // Re-render to show version navigation
        renderMessages();
        
      } catch(error){
        if(error.name !== "AbortError"){
          if(bubble) {
            bubble.classList.remove("typing-indicator");
            bubble.textContent = "Error: " + error.message;
          }
        }
      } finally{
        isStreaming = false;
        aborter = null;
        if(sendBtn) {
          sendBtn.classList.remove("stop");
          sendBtn.title = "Send";
          sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }
      }
    }

    form.addEventListener("submit", e => {
      e.preventDefault();

      if(isStreaming && aborter){
        aborter.abort();
        return;
      }

      const text = promptEl ? promptEl.value.trim() : "";
      if(!text) return;

      if(promptEl) {
        promptEl.value = "";
        promptEl.style.height = "56px";
      }
      sendMessage(text);
    });

    if(promptEl) {
      promptEl.addEventListener("input", () => {
        promptEl.style.height = "56px";
        promptEl.style.height = Math.min(promptEl.scrollHeight, 190) + "px";
      });

      promptEl.addEventListener("keydown", e => {
        if(e.key === "Enter" && !e.shiftKey){
          e.preventDefault();
          form.requestSubmit();
        }
      });
    }

    document.querySelectorAll(".quick").forEach(btn => {
      btn.addEventListener("click", () => {
        if(promptEl) {
          promptEl.value = btn.dataset.prompt || "";
          promptEl.focus();
          promptEl.dispatchEvent(new Event("input"));
        }
      });
    });

    const newChatBtn = $("newChat");
    if(newChatBtn) {
      newChatBtn.onclick = () => {
        // Check if current chat already has messages
        const currentChatObj = currentChat();
        
        if(currentChatObj.messages.length === 0) {
          // Current chat is empty, don't create new one
          if(promptEl) promptEl.focus();
          return;
        }
        
        // Check if there's already an empty chat we can switch to
        const existingEmptyChat = Object.values(chats).find(chat => chat.messages && chat.messages.length === 0);
        
        if(existingEmptyChat) {
          // Switch to existing empty chat
          currentChatId = existingEmptyChat.id;
        } else {
          // Create new chat only if no empty one exists
          currentChatId = makeId();
          chats[currentChatId] = {
            id: currentChatId,
            title: "New Chat",
            messages: [],
            createdAt: Date.now(),
            updatedAt: Date.now()
          };
        }
        
        saveLocal();
        renderAll();
        if(window.innerWidth <= 900 && sidebar) sidebar.classList.remove("open");
        if(promptEl) promptEl.focus();
      };
    }

    const openSide = $("openSide");
    if(openSide) openSide.onclick = () => { if(sidebar) sidebar.classList.add("open"); };
    
    const closeSide = $("closeSide");
    if(closeSide) closeSide.onclick = () => { if(sidebar) sidebar.classList.remove("open"); };

    if(messagesEl) {
      messagesEl.addEventListener("click", () => {
        if(window.innerWidth <= 900 && sidebar) sidebar.classList.remove("open");
      });
    }

    if(googleLogin) {
      googleLogin.onclick = async () => {
        try{await auth.signInWithPopup(provider)}
        catch(error){alert(error.message)}
      };
    }

    if(userBox) {
      userBox.onclick = async () => {
        if(confirm("Sign out of Atlas?")) await auth.signOut();
      };
    }

    auth.onAuthStateChanged(async user => {
      currentUser = user;

      if(user){
        const name = user.displayName || "Atlas User";
        if(fullName) fullName.textContent = name;
        if(userEmail) userEmail.textContent = user.email || "";
        if(userPic) userPic.src = user.photoURL || "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=111820&color=ffffff";
        if(googleLogin) googleLogin.classList.add("hidden");
        if(userBox) userBox.classList.remove("hidden");
        if(loginLock) loginLock.classList.add("hidden");
        if(promptEl) promptEl.disabled = false;

        localStorage.setItem("atlas_user", JSON.stringify({
          uid: user.uid,
          name: name,
          email: user.email || "",
          photoURL: user.photoURL || ""
        }));

        await loadFirestoreChats();
      } else {
        if(googleLogin) googleLogin.classList.remove("hidden");
        if(userBox) userBox.classList.add("hidden");
        if(loginLock) loginLock.classList.remove("hidden");
        if(promptEl) promptEl.disabled = true;
        localStorage.removeItem("atlas_user");
      }

      renderAll();
    });

    // Initialize
    currentChat();
    renderAll();
  </script>
</body>
</html>

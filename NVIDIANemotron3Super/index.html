<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVIDIA Nemotron 3 Super</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#05070d;
      --bg2:#080d16;
      --panel:rgba(12,18,31,.78);
      --panel2:rgba(17,25,42,.86);
      --glass:rgba(255,255,255,.055);
      --hover:rgba(255,255,255,.09);
      --text:#f5f8ff;
      --muted:#96a3b8;
      --soft:#c7d3e8;
      --line:rgba(167,192,255,.16);
      --cyan:#42e8ff;
      --green:#76ff7a;
      --pink:#ff5bd7;
      --yellow:#ffd166;
      --danger:#ff4d6d;
      --radius:8px;
      --shadow:0 24px 80px rgba(0,0,0,.55);
    }

    html,body{height:100%}
    body{
      overflow:hidden;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 17% 18%, rgba(66,232,255,.16), transparent 26%),
        radial-gradient(circle at 84% 20%, rgba(255,91,215,.13), transparent 25%),
        radial-gradient(circle at 66% 86%, rgba(118,255,122,.10), transparent 27%),
        linear-gradient(135deg,#03050a 0%,#09111d 42%,#04070d 100%);
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.72) 0 1px, transparent 1px),
        radial-gradient(circle, rgba(66,232,255,.55) 0 1px, transparent 1px);
      background-size:68px 68px,113px 113px;
      background-position:0 0,22px 31px;
      opacity:.18;
      animation:starDrift 28s linear infinite;
    }

    body:after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:linear-gradient(120deg, transparent 0 38%, rgba(66,232,255,.075) 50%, transparent 62%);
      transform:translateX(-45%);
      animation:scan 9s ease-in-out infinite;
    }

    @keyframes starDrift{to{background-position:68px 68px,135px 144px}}
    @keyframes scan{50%{transform:translateX(45%)}100%{transform:translateX(120%)}}

    button,input,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}
    svg{width:19px;height:19px;flex:0 0 auto}

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:310px minmax(0,1fr);
      position:relative;
      z-index:1;
    }

    .sidebar{
      height:100vh;
      min-width:0;
      display:flex;
      flex-direction:column;
      border-right:1px solid var(--line);
      background:rgba(5,8,14,.76);
      backdrop-filter:blur(24px);
      box-shadow:18px 0 70px rgba(0,0,0,.38);
    }

    .side-head,.top{
      height:76px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--line);
    }

    .side-head{padding:0 16px}
    .top{
      padding:0 22px;
      background:rgba(5,8,14,.52);
      backdrop-filter:blur(22px);
    }

    .brand,.model-title,.status-pill{display:flex;align-items:center}
    .brand{gap:12px;min-width:0}
    .model-title{gap:13px;min-width:0}
    .brand span,.model-title h1{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand span{font-size:22px;font-weight:900}
    .model-title h1{font-size:21px;font-weight:900}

    .logo,.hero-logo,.avatar{
      object-fit:contain;
      background:#fff;
      border:1px solid rgba(255,255,255,.24);
    }
    .logo,.hero-logo{
      width:42px;
      height:42px;
      border-radius:8px;
      padding:5px;
      box-shadow:0 0 28px rgba(118,255,122,.24);
    }
    .avatar{width:34px;height:34px;border-radius:50%;padding:4px}

    .icon-btn,.mini,.send,.new-chat,.chip,.google-btn,.user-btn{
      border-radius:var(--radius);
      transition:transform .18s ease,border-color .18s ease,background .18s ease,box-shadow .18s ease;
    }

    .icon-btn,.mini{
      border:1px solid var(--line);
      background:var(--glass);
      color:var(--soft);
      display:grid;
      place-items:center;
    }
    .icon-btn{width:40px;height:40px}
    .mini{width:34px;height:34px}
    .icon-btn:hover,.mini:hover{
      transform:translateY(-1px);
      background:var(--hover);
      color:var(--text);
      border-color:rgba(66,232,255,.5);
      box-shadow:0 0 24px rgba(66,232,255,.12);
    }

    .new-chat{
      height:48px;
      margin:14px;
      border:1px solid rgba(66,232,255,.38);
      background:linear-gradient(135deg,rgba(66,232,255,.16),rgba(118,255,122,.10));
      color:var(--text);
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      box-shadow:0 0 34px rgba(66,232,255,.10);
    }
    .new-chat:hover{transform:translateY(-1px);border-color:rgba(118,255,122,.58)}

    .side-title{
      padding:13px 16px 9px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0;
      border-top:1px solid var(--line);
    }

    .chat-list{flex:1;overflow:auto;padding:0 10px 12px}
    .chat-item{
      width:100%;
      min-height:44px;
      border:1px solid transparent;
      border-radius:var(--radius);
      background:transparent;
      color:var(--soft);
      padding:10px 12px;
      text-align:left;
      display:flex;
      align-items:center;
      gap:9px;
      margin-bottom:4px;
    }
    .chat-item:hover{background:var(--hover);border-color:rgba(66,232,255,.26)}
    .chat-item.active{
      color:var(--text);
      background:linear-gradient(135deg,rgba(66,232,255,.15),rgba(255,91,215,.09));
      border-color:rgba(66,232,255,.46);
    }
    .chat-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}

    .account{border-top:1px solid var(--line);padding:13px 14px 16px}
    .google-btn,.user-btn{
      width:100%;
      min-height:47px;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 12px;
    }
    .google-btn{background:#fff;color:#111827;font-weight:800;justify-content:center}
    .user-btn{background:var(--glass);color:var(--text);text-align:left}
    .user-btn img{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#dbeafe}
    .user-name,.user-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-name{font-weight:800;font-size:14px}
    .user-email{font-size:12px;color:var(--muted)}

    .main{height:100vh;display:flex;flex-direction:column;min-width:0}
    .menu-btn{display:none}

    .status-pill{
      gap:8px;
      height:34px;
      padding:0 11px;
      border:1px solid rgba(118,255,122,.28);
      border-radius:999px;
      color:#d9ffe2;
      background:rgba(118,255,122,.08);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 16px var(--green);
    }

    .messages{
      flex:1;
      overflow:auto;
      padding:32px 22px 24px;
      scroll-behavior:smooth;
    }

    .welcome{
      max-width:900px;
      margin:0 auto 26px;
      text-align:center;
      padding-top:34px;
    }
    .welcome-row{display:flex;justify-content:center;align-items:center;margin-bottom:20px}
    .welcome h2{
      font-size:clamp(34px,5vw,64px);
      line-height:1.02;
      font-weight:900;
      background:linear-gradient(90deg,#fff,#42e8ff,#76ff7a,#ff5bd7);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .welcome p{
      max-width:620px;
      margin:14px auto 0;
      color:var(--muted);
      font-size:17px;
      line-height:1.6;
    }

    .quick-grid{
      max-width:900px;
      margin:28px auto 0;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .quick{
      min-height:76px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.045);
      color:var(--text);
      padding:15px;
      text-align:left;
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .quick:hover{
      background:rgba(255,255,255,.075);
      border-color:rgba(66,232,255,.45);
      box-shadow:0 0 30px rgba(66,232,255,.10);
      transform:translateY(-1px);
    }
    .quick strong{display:block;font-size:14px;margin-bottom:4px}
    .quick span{display:block;font-size:13px;color:var(--muted);line-height:1.35}

    .thread{
      max-width:900px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .msg{display:flex;gap:12px;align-items:flex-start}
    .msg.user{justify-content:flex-end}

    .bubble{
      max-width:min(720px,88%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px 15px;
      line-height:1.65;
      font-size:15px;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
      box-shadow:var(--shadow);
    }
    .user .bubble{
      background:linear-gradient(135deg,rgba(66,232,255,.18),rgba(118,255,122,.10));
      border-color:rgba(66,232,255,.35);
    }
    .assistant .bubble{
      background:rgba(10,16,28,.78);
      border-color:rgba(255,255,255,.13);
    }
    .actions{display:flex;gap:8px;margin-top:9px}

    .composer-wrap{
      padding:14px 22px 22px;
      border-top:1px solid var(--line);
      background:rgba(5,8,14,.68);
      backdrop-filter:blur(22px);
    }
    .lock{
      max-width:900px;
      margin:0 auto 12px;
      border:1px solid rgba(255,77,109,.4);
      background:rgba(255,77,109,.11);
      color:#ffd6de;
      padding:11px 13px;
      border-radius:var(--radius);
      font-size:14px;
    }
    .composer{
      max-width:900px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 54px;
      gap:10px;
      align-items:end;
    }
    textarea{
      height:56px;
      max-height:190px;
      resize:none;
      border:1px solid rgba(66,232,255,.24);
      border-radius:var(--radius);
      background:rgba(7,12,22,.9);
      color:var(--text);
      padding:17px 16px;
      outline:none;
      font-size:15px;
      line-height:1.45;
      box-shadow:inset 0 0 24px rgba(66,232,255,.04);
    }
    textarea:focus{
      border-color:rgba(66,232,255,.72);
      box-shadow:0 0 0 4px rgba(66,232,255,.10), inset 0 0 24px rgba(66,232,255,.06);
    }
    textarea:disabled{opacity:.6}
    .send{
      height:56px;
      border:1px solid rgba(118,255,122,.6);
      background:linear-gradient(135deg,var(--green),var(--cyan));
      color:#061014;
      font-weight:900;
      display:grid;
      place-items:center;
      box-shadow:0 0 34px rgba(118,255,122,.22);
    }
    .send:hover{transform:translateY(-1px)}
    .send.stop{
      background:linear-gradient(135deg,var(--danger),#ff9f1c);
      border-color:rgba(255,77,109,.75);
      color:#fff;
    }

    .hidden{display:none!important}

    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:fixed;
        inset:0 auto 0 0;
        width:min(314px,86vw);
        z-index:20;
        transform:translateX(-105%);
        transition:transform .22s ease;
      }
      .sidebar.open{transform:translateX(0)}
      .menu-btn{display:grid}
      .top{padding:0 14px}
      .model-title h1{font-size:17px}
      .status-pill{display:none}
      .messages{padding:22px 12px}
      .composer-wrap{padding:12px}
      .bubble{max-width:92%}
      .quick-grid{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <div class="brand">
          <img class="logo" src="../assets/logo.png" alt="Atlas logo" onerror="this.src='https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256'">

        <button class="icon-btn" id="closeSide" title="Close sidebar" type="button">

      </div>

      <button class="new-chat" id="newChat" type="button">

        New Chat
      </button>

      <div class="side-title">Previous Chats</div>
      <div class="chat-list" id="chatList"></div>

      <div class="account">
        <button class="google-btn" id="googleLogin" type="button">
          <svg width="19" height="19" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.2 4 9.5 8.5 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.1 0 9.8-2 13.3-5.2l-6.2-5.2C29.1 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.8l-6.5 5C9.3 39.6 16 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.4-.4-3.5z"/>

          Continue with Google
        </button>

        <button class="user-btn hidden" id="userBox" title="Click to sign out" type="button">
          <img id="userPic" alt="User profile">
          <div style="min-width:0">
            <div class="user-name" id="fullName"></div>
            <div class="user-email" id="userEmail"></div>
          </div>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="top">
        <button class="icon-btn menu-btn" id="openSide" title="Open sidebar" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>

        <div class="model-title">
          <img class="hero-logo" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA logo">
          <h1>NVIDIA Nemotron 3 Super</h1>
        </div>

        <a class="icon-btn" href="../index.html" title="Back to Atlas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m15 18-6-6 6-6"/></svg>
        </a>
      </header>

      <section class="messages" id="messages">
        <div class="welcome" id="welcome">
          <div class="welcome-row">
            <img class="hero-logo" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA logo">
          </div>
          <h2>Ask Anything.</h2>
          <p>Change your world with Artificial Intelligence</p>

          <div class="quick-grid">
            <button class="quick" type="button" data-prompt="Create a futuristic landing page concept for an AI product.">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v6M12 16v6M4.93 4.93l4.24 4.24M14.83 14.83l4.24 4.24M2 12h6M16 12h6M4.93 19.07l4.24-4.24M14.83 9.17l4.24-4.24"/></svg>
              <span><strong>Design something</strong><span>Generate a sleek space-age UI idea.</span></span>
            </button>
            <button class="quick" type="button" data-prompt="Fix and improve this code. Explain the bugs clearly.">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
              <span><strong>Debug code</strong><span>Find issues and make it stronger.</span></span>

              <span><strong>Plan learning</strong><span>Turn a big goal into steps.</span></span>
            </button>
            <button class="quick" type="button" data-prompt="Write a creative space-themed story opening.">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
              <span><strong>Write creatively</strong><span>Draft sharper futuristic text.</span></span>
            </button>
          </div>
        </div>

        <div class="thread" id="thread"></div>
      </section>

      <div class="composer-wrap">
        <div class="lock hidden" id="loginLock">Please continue with Google before sending messages.</div>
        <form class="composer" id="chatForm">
          <textarea id="prompt" placeholder="Transmit a message..." rows="1"></textarea>
          <button class="send" id="sendBtn" type="submit" title="Send">
            <svg id="sendIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const OPENROUTER_API_KEY = "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";
    const MODEL = "nvidia/nemotron-3-super-120b-a12b:free";

    const firebaseConfig = {
      apiKey: "AIzaSyA8jOSZR4Z7QtYUq4B5L1UIpL4_LWOQJb8",
      authDomain: "bdatlasai.firebaseapp.com",
      projectId: "bdatlasai",
      storageBucket: "bdatlasai.firebasestorage.app",
      messagingSenderId: "1021100223861",
      appId: "1:1021100223861:web:dd34c5ccda087a701fb73c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    const $ = id => document.getElementById(id);
    const sidebar = $("sidebar");
    const chatList = $("chatList");
    const thread = $("thread");
    const welcome = $("welcome");
    const messagesEl = $("messages");
    const promptEl = $("prompt");
    const form = $("chatForm");
    const sendBtn = $("sendBtn");
    const loginLock = $("loginLock");
    const googleLogin = $("googleLogin");
    const userBox = $("userBox");
    const userPic = $("userPic");
    const fullName = $("fullName");
    const userEmail = $("userEmail");

    let currentUser = null;
    let currentChatId = localStorage.getItem("nemotron_current_chat") || makeId();
    let chats = safeJSON(localStorage.getItem("nemotron_chats"), {});
    let aborter = null;
    let isStreaming = false;

    function makeId(){
      return "chat_" + Date.now() + "_" + Math.random().toString(16).slice(2);
    }

    function safeJSON(value, fallback){
      try{return JSON.parse(value) || fallback}
      catch{return fallback}
    }

    function saveLocal(){
      localStorage.setItem("nemotron_current_chat", currentChatId);
      localStorage.setItem("nemotron_chats", JSON.stringify(chats));
    }

    function currentChat(){
      if(!chats[currentChatId]){
        chats[currentChatId] = {
          id:currentChatId,
          title:"New Chat",
          messages:[],
          createdAt:Date.now(),
          updatedAt:Date.now()
        };
      }
      return chats[currentChatId];
    }

    function escapeHtml(text){
      return String(text).replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function scrollBottom(){
      requestAnimationFrame(() => messagesEl.scrollTop = messagesEl.scrollHeight);
    }

    function icon(name){
      const paths = {
        copy:'<path d="M8 8h10v12H8z"/><path d="M6 16H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
        retry:'<path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v7h-7"/>',
        audio:'<path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>'
      };
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' + paths[name] + '</svg>';
    }

    function renderChats(){
      const list = Object.values(chats).sort((a,b)=>(b.updatedAt || 0) - (a.updatedAt || 0));
      chatList.innerHTML = list.length ? "" : '<div style="padding:12px;color:var(--muted);font-size:14px">No previous chats.</div>';

      list.forEach(chat => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg><span>' + escapeHtml(chat.title || "New Chat") + '</span>';
        btn.onclick = () => {
          currentChatId = chat.id;
          saveLocal();
          renderAll();
          sidebar.classList.remove("open");
        };
        chatList.appendChild(btn);
      });
    }

    function renderMessages(){
      const chat = currentChat();
      welcome.classList.toggle("hidden", chat.messages.length > 0);
      thread.innerHTML = "";
      chat.messages.forEach((msg, index) => addMessageNode(msg.role, msg.content, index));
      scrollBottom();
    }

    function addMessageNode(role, content, index){
      const row = document.createElement("div");
      row.className = "msg " + role;

      if(role === "assistant"){
        row.innerHTML =
          '<img class="avatar" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA">' +
          '<div><div class="bubble">' + escapeHtml(content) + '</div>' +
          '<div class="actions">' +
          '<button class="mini copy" type="button" title="Copy">' + icon("copy") + '</button>' +
          '<button class="mini retry" type="button" title="Try again">' + icon("retry") + '</button>' +
          '<button class="mini aloud" type="button" title="Read aloud">' + icon("audio") + '</button>' +
          '</div></div>';

        row.querySelector(".copy").onclick = async () => {
          try{await navigator.clipboard.writeText(content)}
          catch{alert("Copy failed.")}
        };
        row.querySelector(".retry").onclick = () => retryLast(index);
        row.querySelector(".aloud").onclick = () => {
          speechSynthesis.cancel();
          speechSynthesis.speak(new SpeechSynthesisUtterance(content));
        };
      }else{
        row.innerHTML = '<div class="bubble">' + escapeHtml(content) + '</div>';
      }

      thread.appendChild(row);
      return row;
    }

    function pushMessage(role, content){
      const chat = currentChat();
      chat.messages.push({role, content});
      chat.updatedAt = Date.now();

      if(role === "user" && (chat.title === "New Chat" || !chat.title)){
        chat.title = content.replace(/\s+/g, " ").trim().slice(0, 42) || "New Chat";
      }

      saveLocal();
      renderChats();
      saveFirestore();
    }

    function renderAll(){
      renderChats();
      renderMessages();
    }

    async function saveFirestore(){
      if(!currentUser) return;

      const chat = currentChat();
      try{
        await db.collection("users").doc(currentUser.uid).set({
          name: currentUser.displayName || "",
          email: currentUser.email || "",
          photoURL: currentUser.photoURL || "",
          lastModel: "NVIDIA Nemotron 3 Super",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge:true});

        await db.collection("users").doc(currentUser.uid).collection("chats").doc(chat.id).set({
          title: chat.title,
          model: MODEL,
          messages: chat.messages,
          createdAt: chat.createdAt,
          updatedAt: chat.updatedAt,
          savedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge:true});
      }catch(error){
        console.warn("Firestore save failed:", error);
      }
    }

    async function loadFirestoreChats(){
      if(!currentUser) return;

      try{
        const snap = await db.collection("users").doc(currentUser.uid).collection("chats").orderBy("updatedAt","desc").limit(30).get();
        snap.forEach(doc => {
          const data = doc.data();
          chats[doc.id] = {
            id: doc.id,
            title: data.title || "New Chat",
            messages: Array.isArray(data.messages) ? data.messages : [],
            createdAt: data.createdAt || Date.now(),
            updatedAt: data.updatedAt || Date.now()
          };
        });
        saveLocal();
        renderAll();
      }catch(error){
        console.warn("Firestore load failed:", error);
      }
    }

    async function sendMessage(text){
      if(!currentUser){
        loginLock.classList.remove("hidden");
        promptEl.disabled = true;
        return;
      }

      if(!OPENROUTER_API_KEY || OPENROUTER_API_KEY.includes("PASTE_YOUR")){
        alert("Add your OpenRouter API key inside OPENROUTER_API_KEY first.");
        return;
      }

      pushMessage("user", text);
      renderMessages();

      const assistantRow = addMessageNode("assistant", "", currentChat().messages.length);
      const bubble = assistantRow.querySelector(".bubble");
      welcome.classList.add("hidden");
      scrollBottom();

      isStreaming = true;
      aborter = new AbortController();
      sendBtn.classList.add("stop");
      sendBtn.title = "Stop";
      sendBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v10H7z"/></svg>';

      let assistantText = "";

      try{
        const chatMessages = currentChat().messages.map(m => ({role:m.role, content:m.content}));

        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method:"POST",
          signal:aborter.signal,
          headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + OPENROUTER_API_KEY,
            "HTTP-Referer": location.origin || location.href,
            "X-Title":"Atlas"
          },
          body:JSON.stringify({
            model:MODEL,
            stream:true,
            messages:[
              {role:"system", content:"You are NVIDIA Nemotron 3 Super inside Atlas. Be helpful, direct, creative, and clear."},
              ...chatMessages
            ]
          })
        });

        if(!res.ok) throw new Error(await res.text());

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while(true){
          const {done,value} = await reader.read();
          if(done) break;

          buffer += decoder.decode(value, {stream:true});
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for(const line of lines){
            const trimmed = line.trim();
            if(!trimmed.startsWith("data:")) continue;

            const data = trimmed.slice(5).trim();
            if(data === "[DONE]") continue;

            try{
              const json = JSON.parse(data);
              const content = json.choices?.[0]?.delta?.content || "";
              if(content){
                assistantText += content;
                bubble.textContent = assistantText;
                scrollBottom();
              }
            }catch{}
          }
        }

        if(!assistantText) assistantText = "I could not generate a response. Please try again.";
        bubble.textContent = assistantText;
        pushMessage("assistant", assistantText);
        renderAll();
      }catch(error){
        if(error.name === "AbortError"){
          if(assistantText.trim()){
            pushMessage("assistant", assistantText + "\n\n[Stopped]");
            renderAll();
          }else{
            bubble.textContent = "Response stopped.";
          }
        }else{
          bubble.textContent = "Error: " + error.message;
        }
      }finally{
        isStreaming = false;
        aborter = null;
        sendBtn.classList.remove("stop");
        sendBtn.title = "Send";
        sendBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>';
      }
    }

    function retryLast(index){
      if(isStreaming) return;

      const chat = currentChat();
      const assistantIndex = typeof index === "number" ? index : chat.messages.length - 1;
      let userIndex = assistantIndex - 1;

      while(userIndex >= 0 && chat.messages[userIndex].role !== "user") userIndex--;
      if(userIndex < 0) return;

      const text = chat.messages[userIndex].content;
      chat.messages = chat.messages.slice(0, userIndex);
      chat.updatedAt = Date.now();
      saveLocal();
      renderAll();
      sendMessage(text);
    }

    form.addEventListener("submit", e => {
      e.preventDefault();

      if(isStreaming && aborter){
        aborter.abort();
        return;
      }

      const text = promptEl.value.trim();
      if(!text) return;

      promptEl.value = "";
      promptEl.style.height = "56px";
      sendMessage(text);
    });

    promptEl.addEventListener("input", () => {
      promptEl.style.height = "56px";
      promptEl.style.height = Math.min(promptEl.scrollHeight, 190) + "px";
    });

    promptEl.addEventListener("keydown", e => {
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        form.requestSubmit();
      }
    });

    document.querySelectorAll(".quick").forEach(btn => {
      btn.addEventListener("click", () => {
        promptEl.value = btn.dataset.prompt || "";
        promptEl.focus();
        promptEl.dispatchEvent(new Event("input"));
      });
    });

    $("newChat").onclick = () => {
      currentChatId = makeId();
      currentChat();
      saveLocal();
      renderAll();
      sidebar.classList.remove("open");
      promptEl.focus();
    };

    $("openSide").onclick = () => sidebar.classList.add("open");
    $("closeSide").onclick = () => sidebar.classList.remove("open");

    messagesEl.addEventListener("click", () => {
      if(window.innerWidth <= 900) sidebar.classList.remove("open");
    });

    googleLogin.onclick = async () => {
      try{await auth.signInWithPopup(provider)}
      catch(error){alert(error.message)}
    };

    userBox.onclick = async () => {
      if(confirm("Sign out of Atlas?")) await auth.signOut();
    };

    auth.onAuthStateChanged(async user => {
      currentUser = user;

      if(user){
        const name = user.displayName || "Atlas User";
        fullName.textContent = name;
        userEmail.textContent = user.email || "";
        userPic.src = user.photoURL || "https://ui-avatars.com/api/?name=" + encodeURIComponent(name) + "&background=111820&color=ffffff";
        googleLogin.classList.add("hidden");
        userBox.classList.remove("hidden");
        loginLock.classList.add("hidden");
        promptEl.disabled = false;

        localStorage.setItem("atlas_user", JSON.stringify({
          uid:user.uid,
          name,
          email:user.email || "",
          photoURL:user.photoURL || ""
        }));

        await loadFirestoreChats();
      }else{
        googleLogin.classList.remove("hidden");
        userBox.classList.add("hidden");
        loginLock.classList.remove("hidden");
        promptEl.disabled = true;
        localStorage.removeItem("atlas_user");
      }

      renderAll();
    });

    currentChat();
    renderAll();
  </script>
</body>
</html>

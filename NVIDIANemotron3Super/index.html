<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVIDIA Nemotron 3 Super</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#05070d;
      --bg2:#080d16;
      --panel:rgba(12,18,31,.78);
      --panel2:rgba(17,25,42,.86);
      --glass:rgba(255,255,255,.055);
      --hover:rgba(255,255,255,.09);
      --text:#f5f8ff;
      --muted:#96a3b8;
      --soft:#c7d3e8;
      --line:rgba(167,192,255,.16);
      --cyan:#42e8ff;
      --green:#76ff7a;
      --pink:#ff5bd7;
      --yellow:#ffd166;
      --danger:#ff4d6d;
      --radius:8px;
      --shadow:0 24px 80px rgba(0,0,0,.55);
    }

    html,body{height:100%}
    body{
      overflow:hidden;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background: url('bg.gif') center/cover no-repeat fixed;
    }

    button,input,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}
    svg{width:19px;height:19px;flex:0 0 auto}

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:310px minmax(0,1fr);
      position:relative;
      z-index:1;
    }

    .sidebar{
      height:100vh;
      min-width:0;
      display:flex;
      flex-direction:column;
      border-right:1px solid var(--line);
      background:rgba(3, 5, 9, 0.76);
      backdrop-filter:blur(24px);
    }

    .side-head,.top{
      height:76px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid var(--line);
    }

    .side-head{padding:0 16px}
    .top{
      padding:0 22px;
      background:rgba(5,8,14,.52);
      backdrop-filter:blur(22px);
    }

    .brand,.model-title,.status-pill{display:flex;align-items:center}
    .brand{gap:12px;min-width:0}
    .model-title{gap:13px;min-width:0}
    .brand span,.model-title h1{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand span{font-size:22px;font-weight:900}
    .model-title h1{font-size:21px;font-weight:900}

    .logo,.hero-logo,.avatar{
      object-fit:contain;
    }
    .logo,.hero-logo{
      width:42px;
      height:42px;
      border-radius:8px;
      padding:5px;
      background: transparent !important;
    }
    .avatar{width:34px;height:34px;border-radius:50%;padding:4px}

    .icon-btn,.mini,.send,.new-chat,.chip,.google-btn,.user-btn,
    .chat-item,.quick,.bubble,.composer-wrap,.side-title,.account,
    .status-pill,.lock,textarea,.side-head,.top,.sidebar{
      border: none !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }

    .icon-btn,.mini,.send,.new-chat,.google-btn,.user-btn{
      border-radius: 100px !important;
      transition:transform .18s ease,background .18s ease;
    }

    .icon-btn,.mini{
      background: #181818;
      color: var(--text);
      display:grid;
      place-items:center;
    }
    .icon-btn{width:40px;height:40px}
    .mini{width:34px;height:34px}
    .icon-btn:hover,.mini:hover{
      transform:translateY(-1px);
      background: #303030;
      color: var(--text);
    }

    .new-chat{
      height:48px;
      margin:14px;
      background: #181818;
      color:var(--text);
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      border-radius: 100px !important;
    }
    .new-chat:hover{
      transform:translateY(-1px);
      background: #303030;
    }

    .side-title{
      padding:13px 16px 9px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:0;
      background: transparent;
    }

    .chat-list{flex:1;overflow:auto;padding:0 10px 12px}
    .chat-item-wrapper {
      position: relative;
      margin-bottom: 4px;
    }
    .chat-item{
      width:100%;
      min-height:44px;
      border-radius: 100px !important;
      background: #181818;
      color:var(--soft);
      padding:10px 16px;
      text-align:left;
      display:flex;
      align-items:center;
      gap:9px;
      transition: all 0.1s ease;
      cursor: pointer;
    }
    .chat-item:hover{
      background: #303030;
      color:var(--text);
    }
    .chat-item.active{
      background: #494949;
      color:var(--text);
    }
    .chat-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;flex:1}
    
    /* three-dot button styles */
    .chat-menu-trigger {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 20px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--soft);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.1s;
      z-index: 5;
    }
    .chat-item-wrapper:hover .chat-menu-trigger {
      opacity: 1;
      background: #2a2a2a;
    }
    .chat-menu-trigger:hover {
      background: #3a3a3a !important;
      color: white;
    }
    
    /* custom dropdown */
    .custom-dropdown {
      position: fixed;
      background: #1e1e2f;
      backdrop-filter: blur(16px);
      background: rgba(20, 24, 36, 0.98);
      border-radius: 14px;
      padding: 8px 0;
      min-width: 150px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.5);
      z-index: 1000;
      border: 1px solid rgba(255,255,255,0.12);
      animation: dropdownFade 0.12s ease;
    }
    @keyframes dropdownFade {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.1s;
      cursor: pointer;
    }
    .dropdown-item i {
      width: 18px;
      font-size: 14px;
      color: var(--muted);
    }
    .dropdown-item:hover {
      background: rgba(255,255,255,0.12);
    }
    
    /* MODAL overlay & popups */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
 backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .popup-card {
      background: #12161f;
      border-radius: 28px;
      width: 340px;
      max-width: 90%;
      padding: 24px 22px 22px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      animation: popSlide 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    @keyframes popSlide {
      from { transform: scale(0.92) translateY(12px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    .popup-card h3 {
      font-size: 20px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    .popup-card input {
      width: 100%;
      background: #1e2532;
      border: none;
      border-radius: 40px;
      padding: 12px 16px;
      color: white;
      margin: 12px 0 20px;
      outline: none;
    }
    .popup-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .popup-actions button {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      background: #2c2f3a;
      color: white;
      transition: 0.1s;
    }
    .popup-actions button.primary {
      background: var(--cyan);
      color: #0a0c12;
    }
    .popup-actions button.danger {
      background: var(--danger);
      color: white;
    }
    .chat-name-preview {
      background: #0b0e14;
      padding: 8px 12px;
      border-radius: 60px;
      font-size: 14px;
      color: var(--muted);
      margin: 8px 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .account{padding:13px 14px 16px}
    .google-btn,.user-btn{
      width:100%;
      min-height:47px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 16px;
      border-radius: 100px !important;
    }
    .google-btn{
      background: #181818;
      color:var(--text);
      font-weight:800;
      justify-content:center;
    }
    .google-btn:hover{
      background: #303030;
    }
    .user-btn{
      background: #181818;
      color:var(--text);
      text-align:left;
    }
    .user-btn:hover{
      background: #303030;
    }
    .user-btn img{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#dbeafe}
    .user-name,.user-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .user-name{font-weight:800;font-size:14px}
    .user-email{font-size:12px;color:var(--muted)}

    .main{height:100vh;display:flex;flex-direction:column;min-width:0}
    .menu-btn{display:none}

    .status-pill{
      gap:8px;
      height:34px;
      padding:0 11px;
      border-radius: 100px !important;
      color:#d9ffe2;
      background: #181818;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .status-pill:hover{
      background: #303030;
    }
    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
    }

    .messages{
      flex:1;
      overflow:auto;
      padding:32px 22px 24px;
      scroll-behavior:smooth;
    }

    .welcome{
      max-width:900px;
      margin:0 auto 26px;
      text-align:center;
      padding-top:34px;
    }
    .welcome-row{display:flex;justify-content:center;align-items:center;margin-bottom:20px}
    .welcome h2{
      font-size:clamp(34px,5vw,64px);
      line-height:1.02;
      font-weight:900;
      background:white;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .welcome p{
      max-width:620px;
      margin:14px auto 0;
      color:var(--muted);
      font-size:17px;
      line-height:1.6;
    }

    .quick-grid{
      max-width:900px;
      margin:28px auto 0;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .quick{
      min-height:76px;
      border-radius: 100px !important;
      background: #181818;
      color:var(--text);
      padding:15px 20px;
      text-align:left;
      display:flex;
      gap:12px;
      align-items:center;
    }
    .quick:hover{
      background: #303030;
      transform:translateY(-1px);
    }
    .quick strong{display:block;font-size:14px;margin-bottom:4px}
    .quick span{display:block;font-size:13px;color:var(--muted);line-height:1.35}

    .thread{
      max-width:900px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .msg{display:flex;gap:12px;align-items:flex-start}
    .msg.user{justify-content:flex-end}

    .bubble{
      max-width:min(720px,88%);
      border-radius: 24px !important;
      padding:14px 18px;
      line-height:1.65;
      font-size:15px;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
      background: #181818;
      color: var(--text);
    }
    .user .bubble{
      background: #494949;
    }
    .assistant .bubble{
      background: #181818;
    }
    .actions{display:flex;gap:8px;margin-top:9px}

    .composer-wrap{
      padding:14px 22px 22px;
      background:rgba(5,8,14,.68);
      backdrop-filter:blur(22px);
    }
    .lock{
      max-width:900px;
      margin:0 auto 12px;
      background:#f8baba;
      color:#f80000;
      padding:11px 13px;
      border-radius: 100px !important;
      font-size:14px;
      text-align:center;
    }
    .composer{
      max-width:900px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 54px;
      gap:10px;
      align-items:end;
    }
    textarea{
      height:56px;
      max-height:190px;
      resize:none;
      border-radius: 100px !important;
      background: #181818;
      color:var(--text);
      padding:17px 20px;
      outline:none;
      font-size:15px;
      line-height:1.45;
    }
    textarea:focus{
      background: #303030;
    }
    textarea:disabled{opacity:.6}
    .send{
      height:56px;
      background: #181818;
      color:#ffffff;
      font-weight:900;
      display:grid;
      place-items:center;
      border-radius: 100px !important;
    }
    .send:hover{
      transform:translateY(-1px);
      background: #303030;
    }
    .send.stop{
      background: #494949;
      color:#fff;
    }

    .hidden{display:none!important}
    .pinned-chat i.fa-thumbtack { color: var(--cyan); }
    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:fixed;
        inset:0 auto 0 0;
        width:min(314px,86vw);
        z-index:20;
        transform:translateX(-105%);
        transition:transform .22s ease;
      }
      .sidebar.open{transform:translateX(0)}
      .menu-btn{display:grid}
      .top{padding:0 14px}
      .model-title h1{font-size:17px}
      .status-pill{display:none}
      .messages{padding:22px 12px}
      .composer-wrap{padding:12px}
      .bubble{max-width:92%}
      .quick-grid{grid-template-columns:1fr}
    }

    .typing-indicator {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 12px 18px;
      background: #181818;
      border-radius: 100px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-10px); opacity: 1; }
    }
    .messages::-webkit-scrollbar {
      width: 6px;
    }
    .messages::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }
    .version-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-right: 12px;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
    }
    .version-nav button {
      background: none;
      border: none;
      color: var(--cyan);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .version-nav button:hover {
      background: rgba(66, 232, 255, 0.2);
    }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <div class="brand">
          <img class="logo" src="../assets/logo.png" alt="Atlas logo" onerror="this.src='https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256'">
          <span>Atlas</span>
        </div>
        <button class="icon-btn" id="closeSide" title="Close sidebar" type="button">
          <i class="fas fa-times"></i>

          <i class="fab fa-google" style="font-size: 19px; margin-right: 8px;"></i>
          Continue with Google
        </button>
        <button class="user-btn hidden" id="userBox" title="Click to sign out" type="button">

    <main class="main">
      <header class="top">

          <i class="fas fa-bars"></i>
        </button>
        <div class="model-title">
          <img class="hero-logo" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA logo">
          <h1>NVIDIA Nemotron 3 Super</h1>

        <a class="icon-btn" href="../index.html" title="Back to Atlas">

        <div class="welcome" id="welcome">
          <div class="welcome-row"><img class="hero-logo" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256" alt="NVIDIA logo"></div>
          <h2>Nemotron 3 Super</h2>
          <p>Advanced Reasoning for Real-World Impact.</p>
          <div class="quick-grid">
            <button class="quick" data-prompt="Create a futuristic landing page concept for an AI product."><i class="fas fa-palette"></i><span><strong>Design something</strong><span>Generate a sleek space-age UI idea.</span></span></button>
            <button class="quick" data-prompt="Fix and improve this code. Explain the bugs clearly."><i class="fas fa-bug"></i><span><strong>Debug code</strong><span>Find issues and make it stronger.</span></span></button>

            <button class="quick" data-prompt="Write a creative space-themed story opening."><i class="fas fa-feather-alt"></i><span><strong>Write creatively</strong><span>Draft sharper futuristic text.</span></span></button>
          </div>
        </div>
        <div class="thread" id="thread"></div>

          <textarea id="prompt" placeholder="Transmit a message..." rows="1"></textarea>
          <button class="send" id="sendBtn" type="submit" title="Send"><i class="fas fa-paper-plane"></i></button>
        </form>
      </div>
    </main>
  </div>
  <script>
    // (Firebase and core logic as before, but integrated with pin/rename/delete + retry animation fix)
    const OPENROUTER_API_KEY = "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";
    const MODEL = "nvidia/nemotron-3-super-120b-a12b:free";
    const firebaseConfig = {
      apiKey: "AIzaSyA8jOSZR4Z7QtYUq4B5L1UIpL4_LWOQJb8",
      authDomain: "bdatlasai.firebaseapp.com",
      projectId: "bdatlasai",
      storageBucket: "bdatlasai.firebasestorage.app",
      messagingSenderId: "1021100223861",

    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    const $ = id => document.getElementById(id);
    let currentUser = null, currentChatId = localStorage.getItem("nemotron_current_chat") || "chat_" + Date.now(), chats = (()=>{try{return JSON.parse(localStorage.getItem("nemotron_chats")||"{}")}catch{return{}}})();
    let aborter = null, isStreaming = false;
    function makeId(){ return "chat_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8); }
    function makeMessageId(){ return "msg_" + Date.now() + "_" + Math.random().toString(36).substr(2, 8); }
    function saveLocal(){ localStorage.setItem("nemotron_current_chat", currentChatId); localStorage.setItem("nemotron_chats", JSON.stringify(chats)); }
    function currentChat(){ if(!chats[currentChatId]) chats[currentChatId] = { id: currentChatId, title: "New Chat", messages: [], createdAt: Date.now(), updatedAt: Date.now(), pinned: false }; if(!chats[currentChatId].messages) chats[currentChatId].messages = []; return chats[currentChatId]; }
    function escapeHtml(s){ return String(s).replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
    function scrollBottom(){ requestAnimationFrame(()=>{ if($("messages")) $("messages").scrollTop = $("messages").scrollHeight; }); }
    
    function renderChats(){
      const container = $("chatList"); if(!container) return;
      let list = Object.values(chats).sort((a,b)=>{ if(a.pinned && !b.pinned) return -1; if(!a.pinned && b.pinned) return 1; return (b.updatedAt||0)-(a.updatedAt||0); });
      container.innerHTML = list.length ? "" : '<div style="padding:12px;color:var(--muted);font-size:14px">No chats.</div>';
      list.forEach(chat=>{
        const wrapper = document.createElement("div"); wrapper.className = "chat-item-wrapper";
        const btn = document.createElement("button"); btn.type = "button"; btn.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
        const iconHtml = chat.pinned ? '<i class="fas fa-thumbtack" style="color:var(--cyan);"></i>' : '<i class="fas fa-comment"></i>';
        btn.innerHTML = iconHtml + '<span>' + escapeHtml(chat.title || "New Chat") + '</span>';
        btn.onclick = (e)=>{ if(e.target.closest('.chat-menu-trigger')) return; currentChatId = chat.id; saveLocal(); renderAll(); if(window.innerWidth<=900) $("sidebar").classList.remove("open"); };
        const threeDot = document.createElement("div"); threeDot.className = "chat-menu-trigger"; threeDot.innerHTML = '<i class="fas fa-ellipsis-h"></i>';
        threeDot.onclick = (e)=>{ e.stopPropagation(); showDropdown(e, chat.id); };
        wrapper.appendChild(btn); wrapper.appendChild(threeDot); container.appendChild(wrapper);
      });
    }
    function showDropdown(clickEvent, chatId){
      const existing = document.querySelector(".custom-dropdown"); if(existing) existing.remove();
      const rect = clickEvent.target.closest('.chat-menu-trigger').getBoundingClientRect();
      const dropdown = document.createElement("div"); dropdown.className = "custom-dropdown";
      dropdown.style.top = (rect.bottom + 4) + "px"; dropdown.style.left = (rect.left - 110) + "px";
      dropdown.innerHTML = `<div class="dropdown-item" data-action="rename"><i class="fas fa-pen"></i> Rename</div><div class="dropdown-item" data-action="delete"><i class="fas fa-trash"></i> Delete</div><div class="dropdown-item" data-action="pin"><i class="fas fa-thumbtack"></i> Pin</div>`;
      document.body.appendChild(dropdown);
      const closeDropdown = (e)=>{ if(!dropdown.contains(e.target)){ dropdown.remove(); document.removeEventListener("click", closeDropdown); } };
      setTimeout(()=> document.addEventListener("click", closeDropdown), 10);
      dropdown.querySelectorAll(".dropdown-item").forEach(item=>{
        item.addEventListener("click", (e)=>{
          const action = item.dataset.action;
          if(action === "rename") showRenamePopup(chatId);
          else if(action === "delete") showDeletePopup(chatId);
          else if(action === "pin") togglePin(chatId);
          dropdown.remove(); document.removeEventListener("click", closeDropdown);
        });
      });
    }
    function showRenamePopup(chatId){
      const chat = chats[chatId]; if(!chat) return;
      const overlay = document.createElement("div"); overlay.className = "modal-overlay";
      overlay.innerHTML = `<div class="popup-card"><h3><i class="fas fa-pen-fancy"></i> Rename Chat</h3><div class="chat-name-preview">${escapeHtml(chat.title || "New Chat")}</div><input type="text" id="renameInput" value="${escapeHtml(chat.title || "New Chat")}" autocomplete="off"><div class="popup-actions"><button class="cancel-btn">Cancel</button><button class="primary save-btn">Save</button></div></div>`;
      document.body.appendChild(overlay);
      const input = overlay.querySelector("#renameInput"); input.focus(); input.select();
      const close = ()=>{ overlay.remove(); };
      overlay.querySelector(".cancel-btn").onclick = close;
      overlay.querySelector(".save-btn").onclick = ()=>{ let newName = input.value.trim(); if(newName){ chat.title = newName.slice(0,60); chat.updatedAt = Date.now(); saveLocal(); renderChats(); saveFirestore(); } close(); };
      overlay.addEventListener("click", (e)=>{ if(e.target === overlay) close(); });
    }
    function showDeletePopup(chatId){
      const chat = chats[chatId]; if(!chat) return;
      const overlay = document.createElement("div"); overlay.className = "modal-overlay";
      overlay.innerHTML = `<div class="popup-card"><h3><i class="fas fa-exclamation-triangle"></i> Are you sure?</h3><div class="chat-name-preview">${escapeHtml(chat.title || "Chat")}</div><p style="margin-bottom: 16px; color:#aaa;">This chat will be permanently deleted.</p><div class="popup-actions"><button class="cancel-btn">Cancel</button><button class="danger delete-btn">Delete</button></div></div>`;
      document.body.appendChild(overlay);
      overlay.querySelector(".cancel-btn").onclick = ()=> overlay.remove();
      overlay.querySelector(".delete-btn").onclick = async ()=>{ 
        if(chatId === currentChatId){ 
          const remaining = Object.values(chats).filter(c=>c.id !== chatId);
          if(remaining.length){ currentChatId = remaining[0].id; }
          else { currentChatId = makeId(); chats[currentChatId] = { id: currentChatId, title: "New Chat", messages: [], createdAt: Date.now(), updatedAt: Date.now(), pinned: false }; }
        }
        delete chats[chatId];
        saveLocal(); renderAll(); if(currentUser){ try{ await db.collection("users").doc(currentUser.uid).collection("chats").doc(chatId).delete(); }catch(e){} }
        overlay.remove();
      };
      overlay.addEventListener("click",(e)=>{ if(e.target === overlay) overlay.remove(); });
    }
    function togglePin(chatId){
      const chat = chats[chatId]; if(chat){ chat.pinned = !chat.pinned; chat.updatedAt = Date.now(); saveLocal(); renderChats(); saveFirestore(); }
    }
    function renderMessages(){
      const chat = currentChat(); if($("welcome")) $("welcome").classList.toggle("hidden", chat.messages && chat.messages.length > 0); const threadDiv = $("thread"); if(threadDiv) threadDiv.innerHTML = "";
      if(chat.messages && chat.messages.length) chat.messages.forEach((msg, idx)=>{ if(msg.role === "assistant") addAssistantNodeWithVersions(msg, idx); else addUserNode(msg.content); });
      scrollBottom();
    }
    function addUserNode(content){ const row = document.createElement("div"); row.className = "msg user"; row.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`; if($("thread")) $("thread").appendChild(row); }
    function addAssistantNodeWithVersions(msg, msgIndex){
      const row = document.createElement("div"); row.className = "msg assistant";
      if(!msg.versions) { msg.versions = [msg.content || ""]; msg.currentVersion = 0; }
      const curr = msg.versions[msg.currentVersion] || "";
      row.innerHTML = `<img class="avatar" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256"><div><div class="bubble">${escapeHtml(curr)}</div><div class="actions"><div class="version-nav"><button class="version-prev"><i class="fas fa-chevron-left"></i></button><span>${msg.currentVersion+1}/${msg.versions.length}</span><button class="version-next"><i class="fas fa-chevron-right"></i></button></div><button class="mini copy" title="Copy"><i class="fas fa-copy"></i></button><button class="mini retry" title="Retry"><i class="fas fa-redo-alt"></i></button><button class="mini aloud" title="Read Aloud"><i class="fas fa-volume-up"></i></button></div></div>`;
      const bubbleDiv = row.querySelector(".bubble"), prevBtn = row.querySelector(".version-prev"), nextBtn = row.querySelector(".version-next"), verSpan = row.querySelector(".version-nav span");
      prevBtn.onclick = ()=>{ if(msg.currentVersion > 0){ msg.currentVersion--; bubbleDiv.innerHTML = escapeHtml(msg.versions[msg.currentVersion]); verSpan.innerText = (msg.currentVersion+1)+'/'+msg.versions.length; saveLocal(); saveFirestore(); updateNavBtns(); } };
      nextBtn.onclick = ()=>{ if(msg.currentVersion < msg.versions.length-1){ msg.currentVersion++; bubbleDiv.innerHTML = escapeHtml(msg.versions[msg.currentVersion]); verSpan.innerText = (msg.currentVersion+1)+'/'+msg.versions.length; saveLocal(); saveFirestore(); updateNavBtns(); } };
      function updateNavBtns(){ prevBtn.disabled = msg.currentVersion===0; nextBtn.disabled = msg.currentVersion===msg.versions.length-1; }
      updateNavBtns();
      row.querySelector(".copy").onclick = ()=> navigator.clipboard.writeText(msg.versions[msg.currentVersion]);
      row.querySelector(".aloud").onclick = ()=>{ speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(msg.versions[msg.currentVersion])); };
      row.querySelector(".retry").onclick = async ()=>{ await retryWithVersion(msgIndex); };
      if($("thread")) $("thread").appendChild(row);
    }
    async function retryWithVersion(assistantIdx){
      if(isStreaming) return; const chat = currentChat(); if(!chat.messages[assistantIdx] || chat.messages[assistantIdx].role !== "assistant") return;
      let userIdx = assistantIdx-1; while(userIdx>=0 && chat.messages[userIdx].role !== "user") userIdx--;
      if(userIdx<0) return; const userText = chat.messages[userIdx].content; const assistantMsg = chat.messages[assistantIdx];
      if(!assistantMsg.versions) assistantMsg.versions = [assistantMsg.content || ""]; assistantMsg.currentVersion = assistantMsg.versions.length-1;
      const bubbleElements = document.querySelectorAll('.msg.assistant .bubble'); const targetBubble = bubbleElements[assistantIdx];
      if(targetBubble){ targetBubble.classList.add("typing-indicator"); targetBubble.innerHTML = '<span></span><span></span><span></span>'; }
      isStreaming = true; if(aborter) aborter.abort(); aborter = new AbortController(); if($("sendBtn")){ $("sendBtn").classList.add("stop"); $("sendBtn").innerHTML = '<i class="fas fa-stop"></i>'; }
      let newResponse = "";
      try{
        const msgsUpTo = chat.messages.slice(0, userIdx+1).map(m=>({role:m.role, content:m.content}));
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", { method:"POST", signal:aborter.signal, headers:{"Content-Type":"application/json","Authorization":"Bearer "+OPENROUTER_API_KEY,"HTTP-Referer":location.origin}, body:JSON.stringify({model:MODEL,stream:true,messages:[{role:"system",content:"You are NVIDIA Nemotron 3 Super."},...msgsUpTo]}) });
        if(!res.ok) throw new Error(await res.text());
        if(targetBubble){ targetBubble.classList.remove("typing-indicator"); targetBubble.innerHTML = ""; }
        const reader = res.body.getReader(); const decoder = new TextDecoder(); let buffer="";
        while(true){ const {done,value}=await reader.read(); if(done)break; buffer+=decoder.decode(value,{stream:true}); const lines=buffer.split("\n"); buffer=lines.pop(); for(const line of lines){ if(!line.trim().startsWith("data:")) continue; const data=line.slice(5).trim(); if(data==="[DONE]")continue; try{ const json=JSON.parse(data); const delta=json.choices?.[0]?.delta?.content||""; if(delta){ newResponse+=delta; if(targetBubble) targetBubble.textContent=newResponse; scrollBottom(); } }catch(e){} } }
        if(!newResponse) newResponse = "Could not regenerate.";
        assistantMsg.versions.push(newResponse); assistantMsg.currentVersion = assistantMsg.versions.length-1; assistantMsg.content = newResponse;
        chat.updatedAt = Date.now(); saveLocal(); saveFirestore(); renderMessages();
      } catch(e){ if(e.name!=="AbortError" && targetBubble){ targetBubble.classList.remove("typing-indicator"); targetBubble.innerHTML = "Error: "+e.message; } } finally{ isStreaming=false; aborter=null; if($("sendBtn")){ $("sendBtn").classList.remove("stop"); $("sendBtn").innerHTML = '<i class="fas fa-paper-plane"></i>'; } }
    }
    function pushMessage(role, content){ let chat = currentChat(); const msgObj = role==="assistant"?{role,content,versions:[content],currentVersion:0,messageId:makeMessageId()}:{role,content}; chat.messages.push(msgObj); chat.updatedAt=Date.now(); if(role==="user" && (chat.title==="New Chat"||!chat.title)) chat.title = (content||"New Chat").slice(0,42); saveLocal(); renderChats(); saveFirestore(); }
    async function saveFirestore(){ if(!currentUser) return; const chat = currentChat(); try{ await db.collection("users").doc(currentUser.uid).set({ name:currentUser.displayName||"", email:currentUser.email||"" },{merge:true}); await db.collection("users").doc(currentUser.uid).collection("chats").doc(chat.id).set({ title:chat.title, model:MODEL, messages:chat.messages, pinned:chat.pinned||false, updatedAt:Date.now() },{merge:true}); }catch(e){} }
    async function loadFirestoreChats(){ if(!currentUser) return; try{ const snap = await db.collection("users").doc(currentUser.uid).collection("chats").get(); snap.forEach(doc=>{ const data=doc.data(); chats[doc.id]={ id:doc.id, title:data.title||"New Chat", messages:data.messages||[], createdAt:data.createdAt||Date.now(), updatedAt:data.updatedAt||Date.now(), pinned:data.pinned||false }; }); saveLocal(); renderAll(); }catch(e){} }
    function renderAll(){ renderChats(); renderMessages(); }
    async function sendMessage(text){ if(!currentUser){ $("loginLock").classList.remove("hidden"); return; } if(!OPENROUTER_API_KEY) return alert("Missing API Key"); pushMessage("user",text); renderMessages(); const assistantPlaceholder = document.createElement("div"); assistantPlaceholder.className = "msg assistant"; assistantPlaceholder.innerHTML = `<img class="avatar" src="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256"><div><div class="bubble typing-indicator" id="tempTyping"><span></span><span></span><span></span></div><div class="actions hidden" id="tempActions"></div></div>`; if($("thread")) $("thread").appendChild(assistantPlaceholder); $("welcome")?.classList.add("hidden"); scrollBottom(); isStreaming=true; aborter=new AbortController(); if($("sendBtn")){ $("sendBtn").classList.add("stop"); $("sendBtn").innerHTML = '<i class="fas fa-stop"></i>'; } let assistantText = ""; const typingDiv = assistantPlaceholder.querySelector("#tempTyping"); try{ const chatHistory = currentChat().messages.filter(m=>m.role!=="assistant" || m.content).map(m=>({role:m.role,content:m.content})); const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{method:"POST",signal:aborter.signal,headers:{"Content-Type":"application/json","Authorization":"Bearer "+OPENROUTER_API_KEY},body:JSON.stringify({model:MODEL,stream:true,messages:[{role:"system",content:"Nemotron 3 Super assistant."},...chatHistory]})}); if(!res.ok)throw new Error(); if(typingDiv){ typingDiv.classList.remove("typing-indicator"); typingDiv.innerHTML=""; } const reader = res.body.getReader(); const decoder=new TextDecoder(); let buffer=""; while(true){ const {done,value}=await reader.read(); if(done)break; buffer+=decoder.decode(value,{stream:true}); const lines=buffer.split("\n"); buffer=lines.pop(); for(const line of lines){ if(!line.trim().startsWith("data:"))continue; const data=line.slice(5).trim(); if(data==="[DONE]")continue; try{ const json=JSON.parse(data); const delta=json.choices?.[0]?.delta?.content||""; if(delta){ assistantText+=delta; if(typingDiv) typingDiv.textContent=assistantText; scrollBottom(); } }catch(e){} } } if(!assistantText) assistantText="No response."; const finalMsg = { role:"assistant", content:assistantText, versions:[assistantText], currentVersion:0, messageId:makeMessageId() }; currentChat().messages.push(finalMsg); currentChat().updatedAt=Date.now(); if(currentChat().title==="New Chat") currentChat().title = (text||"Chat").slice(0,42); saveLocal(); renderChats(); saveFirestore(); assistantPlaceholder.remove(); renderMessages(); } catch(e){ if(e.name!=="AbortError"){ if(typingDiv) typingDiv.innerHTML="Error generating response."; } else { if(assistantText.trim()){ currentChat().messages.push({role:"assistant",content:assistantText+" [Stopped]",versions:[assistantText+" [Stopped]"],currentVersion:0}); saveLocal(); renderMessages(); } } assistantPlaceholder.remove(); if(e.name!=="AbortError") renderMessages(); } finally{ isStreaming=false; aborter=null; if($("sendBtn")){ $("sendBtn").classList.remove("stop"); $("sendBtn").innerHTML = '<i class="fas fa-paper-plane"></i>'; } } }
    $("chatForm").addEventListener("submit", e=>{ e.preventDefault(); if(isStreaming && aborter){ aborter.abort(); return; } const val = $("prompt").value.trim(); if(!val) return; $("prompt").value=""; sendMessage(val); });
    $("newChat").onclick = ()=>{ const emptyExists = Object.values(chats).find(c=>c.messages.length===0); if(emptyExists) currentChatId = emptyExists.id; else{ currentChatId = makeId(); chats[currentChatId]={id:currentChatId,title:"New Chat",messages:[],createdAt:Date.now(),updatedAt:Date.now(),pinned:false}; } saveLocal(); renderAll(); if($("sidebar") && window.innerWidth<=900) $("sidebar").classList.remove("open"); $("prompt")?.focus(); };
    $("openSide")?.addEventListener("click",()=>$("sidebar")?.classList.add("open")); $("closeSide")?.addEventListener("click",()=>$("sidebar")?.classList.remove("open"));
    document.querySelectorAll(".quick").forEach(b=>b.addEventListener("click",()=>{ $("prompt").value = b.dataset.prompt||""; $("prompt").dispatchEvent(new Event("input")); }));
    $("googleLogin").onclick = async ()=>{ try{ await auth.signInWithPopup(provider); }catch(e){ alert(e.message); } };
    $("userBox").onclick = async ()=>{ if(confirm("Sign out?")) await auth.signOut(); };
    auth.onAuthStateChanged(async user=>{ currentUser=user; if(user){ $("googleLogin").classList.add("hidden"); $("userBox").classList.remove("hidden"); $("loginLock")?.classList.add("hidden"); $("prompt").disabled=false; $("fullName").innerText=user.displayName||"Atlas User"; $("userEmail").innerText=user.email||""; $("userPic").src=user.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName||"User")}&background=111820&color=fff`; await loadFirestoreChats(); }else{ $("googleLogin").classList.remove("hidden"); $("userBox").classList.add("hidden"); $("loginLock")?.classList.remove("hidden"); $("prompt").disabled=true; } renderAll(); });
    if(!chats[currentChatId]) chats[currentChatId]={id:currentChatId,title:"New Chat",messages:[],createdAt:Date.now(),updatedAt:Date.now()}; renderAll();
  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
<style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
font-weight: 400;
    }

:root {
  --bg: #0b0f17;
  --panel: #111827;
  --panel-2: #0f1a2b;
  --text: #eef2f7;
  --muted: #9aa6b2;
  --line: #243244;
  --primary: #7c5cff;
  --primary-2: #22c55e;
  --card: #101826;
  --card-hover: #162235;
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
  --radius: 10px;
}

    body {
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(180deg, #0b0f14 0%, #101720 48%, #0b0f14 100%);
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      min-height: 78px;
      display: grid;
      grid-template-columns: 190px minmax(240px, 1fr) auto;
      align-items: center;
      gap: 22px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      object-fit: cover;
      border: 1px solid var(--line);
      background: #ffffff;
    }

.brand span {
  font-size: 26px;
  line-height: 1;
  font-weight: 700;
  letter-spacing: 0;
}

    .search {
      position: relative;
    }

    .search svg {
      width: 19px;
      height: 19px;
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #0f1620;
      color: var(--text);
      padding: 0 16px 0 44px;
      outline: none;
      font-size: 15px;
      font-weight: 400;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .search input::placeholder {
      color: #748293;
    }

    .search input:focus {
      border-color: rgba(56, 189, 248, 0.65);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
      background: #111b26;
    }

    .google-btn {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: #111827;
      cursor: pointer;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      white-space: nowrap;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .google-btn:hover {
      transform: translateY(-2px);
      border-color: #38bdf8;
      box-shadow: 0 12px 26px rgba(56, 189, 248, 0.16);
    }

    .user-box {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
    }

    .user-box img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      background: #dbeafe;
      border: 1px solid var(--line);
    }

    .hero {
      padding: 34px 0 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
    }

.hero h1 {
  max-width: 760px;
  font-size: clamp(32px, 5vw, 54px);
  line-height: 1.05;
  font-weight: 700;
  letter-spacing: 0;
}

    .hero h1 span {
      color: var(--primary);
    }

    .model-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      padding-bottom: 6px;
    }

    .models-section {
      padding: 8px 0 36px;
    }

    .models-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 14px;
    }

    .model-card {
      position: relative;
      min-height: 92px;
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      display: grid;
      grid-template-columns: 50px 1fr 30px;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: translateY(12px);
      animation: cardIn 420ms ease forwards;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .model-card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.48);
      background: var(--card-hover);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.42);
    }

    .model-logo {
      width: 50px;
      height: 50px;
      border-radius: var(--radius);
      object-fit: contain;
      padding: 7px;
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .model-info {
      min-width: 0;
    }

.model-name {
  font-size: 15px;
  line-height: 1.35;
  font-weight: 600;
  color: var(--text);
}

.model-provider {
  margin-top: 6px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.2;
  font-weight: 400;
}

    .model-arrow {
      width: 30px;
      height: 30px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: var(--primary);
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 34px 20px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    footer {
      padding: 22px 0 28px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 820px) {
      .topbar {
        padding: 16px 0;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .user-box,
      .google-btn {
        justify-self: normal;
      }

      .hero {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 460px) {
      .shell {
        width: min(100% - 20px, 1180px);
      }

      .model-card {
        grid-template-columns: 46px 1fr;
      }

      .model-arrow {
        display: none;
      }

      .model-logo {
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo.png" alt="Atlas logo" />
        <span>Atlas</span>
      </div>

      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input id="searchInput" type="search" placeholder="Search AI models..." />
      </div>

      <button class="google-btn" id="googleLogin">
        <svg width="19" height="19" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.2 4 9.5 8.5 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.1 0 9.8-2 13.3-5.2l-6.2-5.2C29.1 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.8l-6.5 5C9.3 39.6 16 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.4-.4-3.5z"/>
        </svg>
        Continue with Google
      </button>

      <div class="user-box hidden" id="userBox">
        <img id="userPic" src="" alt="User profile" />
        <span id="firstName"></span>
      </div>
    </header>

    <section class="hero">
      <h1>Explore your <span>AI models</span></h1>
      <div class="model-count" id="modelCount">23 models</div>
    </section>

    <main class="models-section">
      <div class="models-grid" id="modelsGrid"></div>
    </main>

    <footer>
      © 2026 thedhannomorich. All Rights Reserved.
    </footer>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA8jOSZR4Z7QtYUq4B5L1UIpL4_LWOQJb8",
      authDomain: "bdatlasai.firebaseapp.com",
      projectId: "bdatlasai",
      storageBucket: "bdatlasai.firebasestorage.app",
      messagingSenderId: "1021100223861",
      appId: "1:1021100223861:web:dd34c5ccda087a701fb73c"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

const models = [
  { name: "NVIDIA Nemotron 3 Super", provider: "NVIDIA", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256", url: "/Atlas/NVIDIANemotron3Super" },
  { name: "Poolside Laguna M.1", provider: "Poolside", logo: "https://openrouter.ai/images/icons/poolside-logomark-solid-color.svg", url: "/Atlas/PoolsideLagunaM1" },
  { name: "OpenAI gpt-oss-120b", provider: "OpenAI", logo: "https://openrouter.ai/images/icons/OpenAI.svg", url: "/Atlas/OpenAIgptoss120b" },
  { name: "Z.ai GLM 4.5 Air", provider: "Z.ai", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://z.ai/&size=256", url: "/Atlas/ZaiGLM45Air" },
  { name: "Poolside Laguna XS.2", provider: "Poolside", logo: "https://openrouter.ai/images/icons/poolside-logomark-solid-color.svg", url: "/Atlas/PoolsideLagunaXS2" },
  { name: "OpenAI gpt-oss-20b", provider: "OpenAI", logo: "https://openrouter.ai/images/icons/OpenAI.svg", url: "/Atlas/OpenAIgptoss20b" },
  { name: "NVIDIA Nemotron 3 Ultra", provider: "NVIDIA", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256", url: "/Atlas/NVIDIANemotron3Ultra" },
  { name: "NVIDIA Nemotron 3 Nano 30B A3B", provider: "NVIDIA", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256", url: "/Atlas/NVIDIANemotron3Nano30BA3B" },
  { name: "Google Gemma 4 31B", provider: "Google", logo: "https://openrouter.ai/images/icons/GoogleGemini.svg", url: "/Atlas/GoogleGemma431B" },
  { name: "NVIDIA Nemotron 3 Nano Omni", provider: "NVIDIA", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256", url: "/Atlas/NVIDIANemotron3NanoOmni" },
  { name: "MoonshotAI Kimi K2.6", provider: "MoonshotAI", logo: "https://openrouter.ai/images/icons/MoonshotAI.png", url: "/Atlas/MoonshotAIKimiK26" },
  { name: "NVIDIA Nemotron Nano 9B V2", provider: "NVIDIA", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256", url: "/Atlas/NVIDIANemotronNano9BV2" },
  { name: "NVIDIA Nemotron Nano 12B 2 VL", provider: "NVIDIA", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256", url: "/Atlas/NVIDIANemotronNano12B2VL" },
  { name: "Google Gemma 4 26B A4B", provider: "Google", logo: "https://openrouter.ai/images/icons/GoogleGemini.svg", url: "/Atlas/GoogleGemma426BA4B" },
  { name: "LiquidAI LFM2.5-1.2B-Thinking", provider: "LiquidAI", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://www.liquid.ai/&size=256", url: "/Atlas/LiquidAILFM2512BThinking" },
  { name: "LiquidAI LFM2.5-1.2B-Instruct", provider: "LiquidAI", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://www.liquid.ai/&size=256", url: "/Atlas/LiquidAILFM2512BInstruct" },
  { name: "Qwen3 Next 80B A3B Instruct", provider: "Qwen", logo: "https://openrouter.ai/images/icons/Qwen.png", url: "/Atlas/Qwen3Next80BA3BInstruct" },
  { name: "Meta Llama 3.3 70B Instruct", provider: "Meta", logo: "https://openrouter.ai/images/icons/Meta.png", url: "/Atlas/MetaLlama3370BInstruct" },
  { name: "Venice Uncensored", provider: "Venice", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://huggingface.co/&size=256", url: "/Atlas/VeniceUncensored" },
  { name: "NVIDIA Nemotron 3.5 Content Safety", provider: "NVIDIA", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nvidia.com/&size=256", url: "/Atlas/NVIDIANemotron35ContentSafety" },
  { name: "Nous Hermes 3 405B Instruct", provider: "Nous Research", logo: "https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://nousresearch.com/&size=256", url: "/Atlas/NousHermes3405BInstruct" },
  { name: "Meta Llama 3.2 3B Instruct", provider: "Meta", logo: "https://openrouter.ai/images/icons/Meta.png", url: "/Atlas/MetaLlama323BInstruct" },
  { name: "Qwen3 Coder 480B A35B Instruct", provider: "Qwen", logo: "https://openrouter.ai/images/icons/Qwen.png", url: "/Atlas/Qwen3Coder480BA35BInstruct" }
];

    const modelsGrid = document.getElementById("modelsGrid");
    const searchInput = document.getElementById("searchInput");
    const modelCount = document.getElementById("modelCount");
    const googleLogin = document.getElementById("googleLogin");
    const userBox = document.getElementById("userBox");
    const userPic = document.getElementById("userPic");
    const firstName = document.getElementById("firstName");

    function renderModels(modelList) {
      modelsGrid.innerHTML = "";
      modelCount.textContent = `${modelList.length} model${modelList.length === 1 ? "" : "s"}`;

      if (!modelList.length) {
        modelsGrid.innerHTML = `<div class="empty-state">No models found.</div>`;
        return;
      }

      modelList.forEach((model, index) => {
        const card = document.createElement("a");
        card.className = "model-card";
        card.href = model.url;
        card.style.animationDelay = `${index * 22}ms`;

        card.innerHTML = `
          <img class="model-logo" src="${model.logo}" alt="${model.name} logo" />
          <div class="model-info">
            <div class="model-name">${model.name}</div>
            <div class="model-provider">${model.provider}</div>
          </div>
          <div class="model-arrow" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
              <path d="M5 12h14"></path>
              <path d="m13 5 7 7-7 7"></path>
            </svg>
          </div>
        `;

        card.addEventListener("click", async () => {
          const user = auth.currentUser;
          if (!user) return;

          await db.collection("users").doc(user.uid).set({
            lastSelectedModel: model.name,
            lastSelectedModelUrl: model.url,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        });

        modelsGrid.appendChild(card);
      });
    }

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim().toLowerCase();

      const filteredModels = models.filter(model =>
        model.name.toLowerCase().includes(query) ||
        model.provider.toLowerCase().includes(query)
      );

      renderModels(filteredModels);
    });

    googleLogin.addEventListener("click", async () => {
      try {
        await auth.signInWithPopup(provider);
      } catch (error) {
        alert(error.message);
      }
    });

    auth.onAuthStateChanged(async user => {
      if (user) {
        const displayName = user.displayName || "Atlas User";
        const givenName = displayName.split(" ")[0];

        firstName.textContent = givenName;
        userPic.src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=111820&color=ffffff`;

        googleLogin.classList.add("hidden");
        userBox.classList.remove("hidden");

        await db.collection("users").doc(user.uid).set({
          name: displayName,
          firstName: givenName,
          email: user.email,
          photoURL: user.photoURL || "",
          lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      } else {
        googleLogin.classList.remove("hidden");
        userBox.classList.add("hidden");
      }
    });

    renderModels(models);
  </script>
</body>
</html>
